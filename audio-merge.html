<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>音频合并 - 工具箱</title>
  <script src="https://cdn.jsdelivr.net/npm/lamejs@1.2.1/lame.min.js"></script>
  <style>
    :root {
      --bg: #f7f8fa; --surface: #fff; --border: #e8eaed;
      --text: #1f2329; --text-secondary: #646a73; --text-muted: #8f959e;
      --primary: #2563eb; --primary-light: #eff6ff;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 12px rgba(0,0,0,.04);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Segoe UI", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

    nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; height: 52px; display: flex; align-items: center; gap: 16px; }
    .back { text-decoration: none; color: var(--text-secondary); font-size: 13px; display: flex; align-items: center; gap: 4px; padding: 4px 8px; border-radius: 6px; }
    .back:hover { background: var(--bg); color: var(--text); }
    nav h1 { font-size: 15px; font-weight: 600; }

    .container { max-width: 780px; margin: 0 auto; padding: 24px; width: 100%; flex: 1; display: flex; flex-direction: column; gap: 16px; }

    .drop-zone { border: 2px dashed #c8cdd4; border-radius: var(--radius); padding: 48px 40px; text-align: center; color: var(--text-muted); font-size: 14px; cursor: pointer; transition: all .2s; background: var(--surface); }
    .drop-zone:hover, .drop-zone.drag-over { border-color: var(--primary); background: var(--primary-light); color: var(--primary); }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }

    /* 文件列表 */
    .list-header { display: flex; align-items: center; padding: 12px 16px; border-bottom: 1px solid var(--border); }
    .list-header .title { font-size: 13px; font-weight: 600; flex: 1; }
    .list-header .hint { font-size: 12px; color: var(--text-muted); }
    button.sm-link { background: none; border: none; color: var(--text-muted); font-size: 12px; cursor: pointer; padding: 4px 6px; text-decoration: underline; }
    button.sm-link:hover { color: var(--text); }

    .audio-list { list-style: none; }
    .audio-item { display: flex; align-items: center; gap: 12px; padding: 10px 16px; border-bottom: 1px solid var(--border); cursor: grab; user-select: none; transition: background .1s; }
    .audio-item:last-child { border-bottom: none; }
    .audio-item:active { cursor: grabbing; }
    .audio-item.dragging { opacity: .35; }
    .audio-item.drag-over { background: var(--primary-light); }

    .audio-item .order { width: 22px; height: 22px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--text-muted); font-weight: 600; flex-shrink: 0; }
    .audio-item .icon { width: 36px; height: 36px; background: var(--primary-light); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
    .audio-item .meta { flex: 1; min-width: 0; }
    .audio-item .name { font-size: 13px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .audio-item .detail { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    .item-play { width: 28px; height: 28px; border-radius: 50%; border: 1.5px solid var(--border); background: var(--surface); display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: all .15s; }
    .item-play:hover { background: var(--primary-light); border-color: var(--primary); }
    .item-play svg { width: 12px; height: 12px; fill: var(--text-secondary); }

    .item-actions { display: flex; gap: 2px; flex-shrink: 0; }
    .item-btn { background: none; border: none; width: 26px; height: 26px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 14px; transition: all .1s; }
    .item-btn:hover { background: var(--bg); color: var(--text); }
    .item-btn.danger:hover { background: #fef2f2; color: #dc2626; }

    /* 设置区 */
    .settings { padding: 16px; display: flex; flex-direction: column; gap: 14px; border-top: 1px solid var(--border); }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field > label { font-size: 12px; color: var(--text-muted); font-weight: 500; }
    .btn-group { display: flex; gap: 6px; }
    .opt-btn { flex: 1; padding: 7px 10px; border-radius: 8px; border: 1.5px solid var(--border); background: var(--bg); font-size: 13px; font-weight: 500; cursor: pointer; text-align: center; transition: all .15s; }
    .opt-btn.active { background: var(--primary-light); color: var(--primary); border-color: var(--primary); }
    .opt-btn:hover:not(.active) { border-color: #b0b8c8; }

    .gap-row { display: flex; align-items: center; gap: 10px; }
    .gap-row input[type=range] { flex: 1; accent-color: var(--primary); }
    .gap-row .gap-val { font-size: 12px; color: var(--text-secondary); min-width: 36px; text-align: right; font-variant-numeric: tabular-nums; }

    /* 进度 */
    .progress-area { padding: 16px; border-top: 1px solid var(--border); display: none; flex-direction: column; gap: 8px; }
    .progress-bar-outer { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .progress-bar-inner { height: 100%; background: var(--primary); border-radius: 3px; transition: width .2s; }
    .progress-label { font-size: 13px; color: var(--text-secondary); }

    /* 结果 */
    .result-area { padding: 16px; border-top: 1px solid var(--border); display: none; flex-direction: column; gap: 10px; }
    .result-row { display: flex; align-items: center; gap: 12px; }
    .result-icon { font-size: 28px; }
    .result-info { flex: 1; }
    .result-name { font-size: 14px; font-weight: 500; }
    .result-detail { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
    audio { display: block; width: 100%; }

    /* 底部按钮 */
    .actions { padding: 14px 16px; border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: center; }
    .actions .status { flex: 1; font-size: 13px; color: var(--text-secondary); }
    button { padding: 8px 18px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); font-size: 13px; cursor: pointer; transition: all .15s; font-weight: 500; }
    button:hover:not(:disabled) { background: var(--bg); }
    button:disabled { opacity: .4; cursor: not-allowed; }
    button.primary { background: var(--primary); color: #fff; border-color: var(--primary); }
    button.primary:hover:not(:disabled) { background: #1d4ed8; }
    button.download { background: #16a34a; color: #fff; border-color: #16a34a; }
    button.download:hover:not(:disabled) { background: #15803d; }
  </style>
</head>
<body>
<nav>
  <a href="index.html" class="back">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    返回
  </a>
  <h1>🔗 音频合并</h1>
</nav>

<div class="container">
  <div class="drop-zone" id="drop-zone">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin-bottom:12px;opacity:.4"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
    <div>拖放多个音频文件到此处，或<b>点击选择</b></div>
    <div style="font-size:12px;margin-top:6px;color:#aaa">支持 MP3、WAV、OGG、AAC、M4A、FLAC 等格式</div>
  </div>
  <input type="file" id="file-input" accept="audio/*" multiple style="display:none">

  <div class="card" id="main-card" style="display:none">
    <!-- 列表头 -->
    <div class="list-header">
      <span class="title" id="list-title">音频列表</span>
      <span class="hint">拖拽排序</span>
      <button class="sm-link" onclick="addMore()" style="margin-left:8px">+ 添加更多</button>
      <button class="sm-link danger" onclick="clearAll()" style="color:#dc2626">清空</button>
    </div>

    <!-- 音频列表 -->
    <ul class="audio-list" id="audio-list"></ul>

    <!-- 设置 -->
    <div class="settings">
      <div class="field">
        <label>片段间隔（静音）</label>
        <div class="gap-row">
          <input type="range" id="silence-gap" min="0" max="5" step="0.1" value="0">
          <span class="gap-val" id="gap-val">0 秒</span>
        </div>
      </div>

      <div class="field">
        <label>输出格式</label>
        <div class="btn-group">
          <div class="opt-btn active" data-fmt="mp3">MP3</div>
          <div class="opt-btn" data-fmt="wav">WAV（无损）</div>
        </div>
      </div>

      <div class="field" id="bitrate-field">
        <label>MP3 码率</label>
        <div class="btn-group">
          <div class="opt-btn" data-br="128">128 kbps</div>
          <div class="opt-btn active" data-br="192">192 kbps</div>
          <div class="opt-btn" data-br="320">320 kbps</div>
        </div>
      </div>
    </div>

    <!-- 进度 -->
    <div class="progress-area" id="progress-area">
      <div class="progress-label" id="progress-label">处理中…</div>
      <div class="progress-bar-outer">
        <div class="progress-bar-inner" id="progress-bar" style="width:0%"></div>
      </div>
    </div>

    <!-- 结果 -->
    <div class="result-area" id="result-area">
      <div class="result-row">
        <div class="result-icon">🎵</div>
        <div class="result-info">
          <div class="result-name" id="result-name"></div>
          <div class="result-detail" id="result-detail"></div>
        </div>
      </div>
      <audio id="audio-result" controls></audio>
    </div>

    <!-- 底部操作 -->
    <div class="actions">
      <span class="status" id="status-text">共 0 个文件，总时长 00:00</span>
      <button class="primary" id="btn-merge" onclick="doMerge()">合并音频</button>
      <button class="download" id="btn-download" onclick="downloadResult()" disabled style="display:none">⬇ 下载</button>
    </div>
  </div>
</div>

<!-- 隐藏的预览播放器 -->
<audio id="preview-player" style="display:none"></audio>

<script>
  const items = []; // { file, buffer (AudioBuffer), url }
  let previewingIndex = -1;
  let dragSrcIndex = null;

  let resultBlob = null;
  let resultFilename = '';
  let currentFmt = 'mp3';
  let currentBr = 192;

  const dz = document.getElementById('drop-zone');
  const fileInput = document.getElementById('file-input');

  // ── 文件加载 ──
  dz.addEventListener('click', () => fileInput.click());
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
  dz.addEventListener('drop', e => {
    e.preventDefault(); dz.classList.remove('drag-over');
    const files = [...e.dataTransfer.files].filter(f => f.type.startsWith('audio/'));
    if (files.length) addFiles(files);
  });
  document.addEventListener('dragover', e => e.preventDefault());
  document.addEventListener('drop', e => {
    e.preventDefault();
    const files = [...e.dataTransfer.files].filter(f => f.type.startsWith('audio/'));
    if (files.length) addFiles(files);
  });
  fileInput.addEventListener('change', e => {
    if (e.target.files.length) addFiles([...e.target.files]);
    e.target.value = '';
  });

  function addMore() { fileInput.click(); }

  async function addFiles(files) {
    document.getElementById('main-card').style.display = '';

    for (const file of files) {
      const url = URL.createObjectURL(file);
      const item = { file, buffer: null, url, duration: 0 };
      items.push(item);

      // decode in background
      try {
        const arrayBuffer = await file.arrayBuffer();
        const ctx = new AudioContext();
        item.buffer = await ctx.decodeAudioData(arrayBuffer);
        item.duration = item.buffer.duration;
        await ctx.close();
      } catch (err) {
        item.error = true;
        console.error('Decode failed:', file.name, err);
      }
      renderList();
    }
  }

  function clearAll() {
    stopPreview();
    items.forEach(it => URL.revokeObjectURL(it.url));
    items.length = 0;
    resetResult();
    renderList();
    document.getElementById('main-card').style.display = 'none';
  }

  // ── 列表渲染 ──
  function renderList() {
    const list = document.getElementById('audio-list');
    list.innerHTML = '';

    items.forEach((item, i) => {
      const li = document.createElement('li');
      li.className = 'audio-item';
      li.draggable = true;
      li.dataset.index = i;

      const durationStr = item.buffer ? fmtTime(item.duration) : (item.error ? '解码失败' : '解码中…');
      const detailStr = item.buffer
        ? `${fmtSize(item.file.size)} · ${durationStr} · ${item.buffer.sampleRate} Hz`
        : `${fmtSize(item.file.size)} · ${durationStr}`;

      li.innerHTML = `
        <span class="order">${i + 1}</span>
        <div class="icon">🎵</div>
        <div class="meta">
          <div class="name">${escHtml(item.file.name)}</div>
          <div class="detail">${detailStr}</div>
        </div>
        <button class="item-play" data-i="${i}" title="试听">
          <svg viewBox="0 0 24 24"><polygon points="6,3 20,12 6,21"/></svg>
        </button>
        <div class="item-actions">
          <button class="item-btn" onclick="moveItem(${i}, -1)" title="上移">↑</button>
          <button class="item-btn" onclick="moveItem(${i}, 1)" title="下移">↓</button>
          <button class="item-btn danger" onclick="removeItem(${i})" title="删除">✕</button>
        </div>
      `;

      // preview play
      li.querySelector('.item-play').addEventListener('click', e => {
        e.stopPropagation();
        togglePreview(i);
      });

      // drag reorder
      li.addEventListener('dragstart', () => {
        dragSrcIndex = i;
        requestAnimationFrame(() => li.classList.add('dragging'));
      });
      li.addEventListener('dragend', () => { li.classList.remove('dragging'); dragSrcIndex = null; });
      li.addEventListener('dragover', e => { e.preventDefault(); li.classList.add('drag-over'); });
      li.addEventListener('dragleave', () => li.classList.remove('drag-over'));
      li.addEventListener('drop', e => {
        e.preventDefault(); li.classList.remove('drag-over');
        if (dragSrcIndex !== null && dragSrcIndex !== i) {
          const [moved] = items.splice(dragSrcIndex, 1);
          items.splice(i, 0, moved);
          renderList();
        }
      });

      list.appendChild(li);
    });

    updateStatus();
  }

  function moveItem(index, dir) {
    const newIndex = index + dir;
    if (newIndex < 0 || newIndex >= items.length) return;
    [items[index], items[newIndex]] = [items[newIndex], items[index]];
    renderList();
  }

  function removeItem(index) {
    stopPreview();
    URL.revokeObjectURL(items[index].url);
    items.splice(index, 1);
    renderList();
    if (items.length === 0) {
      document.getElementById('main-card').style.display = 'none';
    }
  }

  function updateStatus() {
    const valid = items.filter(it => it.buffer);
    const totalDuration = valid.reduce((s, it) => s + it.duration, 0);
    const gap = parseFloat(document.getElementById('silence-gap').value) || 0;
    const totalWithGap = totalDuration + Math.max(0, valid.length - 1) * gap;
    document.getElementById('status-text').textContent =
      `共 ${items.length} 个文件，总时长 ${fmtTime(totalWithGap)}`;
    document.getElementById('list-title').textContent = `音频列表（${items.length}）`;
  }

  // ── 试听 ──
  const previewPlayer = document.getElementById('preview-player');

  function togglePreview(index) {
    if (previewingIndex === index) {
      stopPreview();
      return;
    }
    stopPreview();
    const item = items[index];
    if (!item || !item.url) return;
    previewingIndex = index;
    previewPlayer.src = item.url;
    previewPlayer.play();

    // update icon to pause
    const btn = document.querySelector(`.item-play[data-i="${index}"] svg`);
    if (btn) btn.innerHTML = '<rect x="5" y="3" width="4" height="18"/><rect x="15" y="3" width="4" height="18"/>';

    previewPlayer.onended = () => stopPreview();
  }

  function stopPreview() {
    if (previewingIndex >= 0) {
      const btn = document.querySelector(`.item-play[data-i="${previewingIndex}"] svg`);
      if (btn) btn.innerHTML = '<polygon points="6,3 20,12 6,21"/>';
    }
    previewPlayer.pause();
    previewPlayer.removeAttribute('src');
    previewingIndex = -1;
  }

  // ── 设置 ──
  document.getElementById('silence-gap').addEventListener('input', function() {
    document.getElementById('gap-val').textContent = parseFloat(this.value).toFixed(1) + ' 秒';
    updateStatus();
  });

  document.querySelectorAll('[data-fmt]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-fmt]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFmt = btn.dataset.fmt;
      document.getElementById('bitrate-field').style.display = currentFmt === 'wav' ? 'none' : '';
    });
  });
  document.querySelectorAll('[data-br]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-br]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentBr = parseInt(btn.dataset.br);
    });
  });

  // ── 合并导出 ──
  async function doMerge() {
    const valid = items.filter(it => it.buffer);
    if (valid.length === 0) { alert('请先添加音频文件'); return; }
    if (valid.length === 1 && parseFloat(document.getElementById('silence-gap').value) === 0) {
      alert('只有一个音频文件，无需合并。如需裁剪请使用"音频剪辑"工具。');
      return;
    }

    stopPreview();
    document.getElementById('btn-merge').disabled = true;
    document.getElementById('btn-download').style.display = 'none';
    document.getElementById('result-area').style.display = 'none';
    resetProgress(true);
    setProgress(5, '准备合并…');

    try {
      // determine output sample rate (use max among all)
      const sampleRate = Math.max(...valid.map(b => b.buffer.sampleRate));
      const numChannels = Math.max(...valid.map(b => b.buffer.numberOfChannels));
      const gapSeconds = parseFloat(document.getElementById('silence-gap').value) || 0;
      const gapSamples = Math.round(gapSeconds * sampleRate);

      // calculate total length
      let totalSamples = 0;
      for (const item of valid) {
        totalSamples += Math.round(item.buffer.duration * sampleRate);
      }
      totalSamples += gapSamples * (valid.length - 1);

      setProgress(10, '拼接音频…');

      // create output buffer
      const offCtx = new OfflineAudioContext(numChannels, totalSamples, sampleRate);
      const merged = offCtx.createBuffer(numChannels, totalSamples, sampleRate);

      let offset = 0;
      for (let i = 0; i < valid.length; i++) {
        const buf = valid[i].buffer;
        const resampledLength = Math.round(buf.duration * sampleRate);

        // resample if needed by writing via OfflineAudioContext
        let srcBuf = buf;
        if (buf.sampleRate !== sampleRate) {
          const resampleCtx = new OfflineAudioContext(buf.numberOfChannels, resampledLength, sampleRate);
          const source = resampleCtx.createBufferSource();
          source.buffer = buf;
          source.connect(resampleCtx.destination);
          source.start();
          srcBuf = await resampleCtx.startRendering();
        }

        for (let ch = 0; ch < numChannels; ch++) {
          const srcCh = ch < srcBuf.numberOfChannels ? ch : 0;
          const data = srcBuf.getChannelData(srcCh);
          merged.getChannelData(ch).set(data, offset);
        }
        offset += srcBuf.length;

        // add silence gap (already zero-filled by default)
        if (i < valid.length - 1) offset += gapSamples;

        setProgress(10 + (i + 1) / valid.length * 15, `拼接中… ${i + 1}/${valid.length}`);
      }

      setProgress(25, '编码中…');

      let blob;
      if (currentFmt === 'wav') {
        blob = encodeWav(merged, p => setProgress(25 + p * 70, `编码中… ${Math.round(p * 100)}%`));
      } else {
        blob = await encodeMp3(merged, currentBr, p => setProgress(25 + p * 70, `编码中… ${Math.round(p * 100)}%`));
      }

      setProgress(100, '完成');

      resultFilename = 'merged_audio.' + currentFmt;
      resultBlob = blob;

      const url = URL.createObjectURL(blob);
      document.getElementById('audio-result').src = url;
      document.getElementById('result-name').textContent = resultFilename;
      document.getElementById('result-detail').textContent =
        `${fmtSize(blob.size)} · ${fmtTime(merged.duration)} · ${sampleRate} Hz · ${valid.length} 个片段`;

      document.getElementById('result-area').style.display = 'flex';
      document.getElementById('btn-download').style.display = '';
      document.getElementById('btn-download').disabled = false;
      resetProgress(false);

    } catch (err) {
      resetProgress(false);
      alert('合并失败：' + err.message);
      console.error(err);
    }

    document.getElementById('btn-merge').disabled = false;
  }

  // ── WAV 编码 ──
  function encodeWav(audioBuffer, onProgress) {
    const numCh = Math.min(audioBuffer.numberOfChannels, 2);
    const sr = audioBuffer.sampleRate;
    const left = audioBuffer.getChannelData(0);
    const right = numCh >= 2 ? audioBuffer.getChannelData(1) : left;
    const samples = left.length;
    const bytePerSample = 2;
    const dataLen = samples * numCh * bytePerSample;
    const buffer = new ArrayBuffer(44 + dataLen);
    const view = new DataView(buffer);
    const write = (off, str) => { for (let i = 0; i < str.length; i++) view.setUint8(off + i, str.charCodeAt(i)); };
    write(0, 'RIFF'); view.setUint32(4, 36 + dataLen, true);
    write(8, 'WAVE'); write(12, 'fmt ');
    view.setUint32(16, 16, true); view.setUint16(20, 1, true);
    view.setUint16(22, numCh, true); view.setUint32(24, sr, true);
    view.setUint32(28, sr * numCh * bytePerSample, true);
    view.setUint16(32, numCh * bytePerSample, true); view.setUint16(34, 16, true);
    write(36, 'data'); view.setUint32(40, dataLen, true);
    let offset = 44;
    for (let i = 0; i < samples; i++) {
      view.setInt16(offset, clamp16(left[i]), true); offset += 2;
      if (numCh >= 2) { view.setInt16(offset, clamp16(right[i]), true); offset += 2; }
    }
    onProgress && onProgress(1);
    return new Blob([buffer], { type: 'audio/wav' });
  }

  // ── MP3 编码 (lamejs) ──
  async function encodeMp3(audioBuffer, bitrate, onProgress) {
    const numCh = Math.min(audioBuffer.numberOfChannels, 2);
    const sr = audioBuffer.sampleRate;
    const left = float32ToInt16(audioBuffer.getChannelData(0));
    const right = numCh >= 2 ? float32ToInt16(audioBuffer.getChannelData(1)) : left;

    const encoder = new lamejs.Mp3Encoder(numCh, sr, bitrate);
    const mp3Parts = [];
    const chunkSize = 1152;
    const total = left.length;

    for (let i = 0; i < total; i += chunkSize) {
      const l = left.subarray(i, i + chunkSize);
      const r = right.subarray(i, i + chunkSize);
      const buf = numCh === 1 ? encoder.encodeBuffer(l) : encoder.encodeBuffer(l, r);
      if (buf.length > 0) mp3Parts.push(buf);

      if (i % (chunkSize * 50) === 0) {
        onProgress(i / total);
        await new Promise(r => setTimeout(r, 0));
      }
    }

    const tail = encoder.flush();
    if (tail.length > 0) mp3Parts.push(tail);
    onProgress(1);
    return new Blob(mp3Parts, { type: 'audio/mpeg' });
  }

  // ── 工具函数 ──
  function float32ToInt16(f32) {
    const i16 = new Int16Array(f32.length);
    for (let i = 0; i < f32.length; i++) i16[i] = clamp16(f32[i]);
    return i16;
  }

  function clamp16(v) {
    const s = Math.max(-1, Math.min(1, v));
    return s < 0 ? s * 0x8000 : s * 0x7FFF;
  }

  function fmtTime(s) {
    if (!isFinite(s)) return '--:--';
    const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = Math.floor(s % 60);
    if (h > 0) return `${h}:${String(m).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
    return `${String(m).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
  }

  function fmtSize(b) {
    if (b < 1024) return b + ' B';
    if (b < 1024 * 1024) return (b / 1024).toFixed(1) + ' KB';
    return (b / 1024 / 1024).toFixed(1) + ' MB';
  }

  function escHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function setProgress(pct, label) {
    document.getElementById('progress-bar').style.width = pct + '%';
    document.getElementById('progress-label').textContent = label;
  }

  function resetProgress(show) {
    document.getElementById('progress-area').style.display = show ? 'flex' : 'none';
    document.getElementById('progress-bar').style.width = '0%';
  }

  function resetResult() {
    resultBlob = null;
    document.getElementById('result-area').style.display = 'none';
    document.getElementById('btn-download').style.display = 'none';
    document.getElementById('btn-download').disabled = true;
    resetProgress(false);
  }

  function downloadResult() {
    if (!resultBlob) return;
    const a = document.createElement('a');
    a.href = URL.createObjectURL(resultBlob);
    a.download = resultFilename;
    a.click();
  }
</script>
</body>
