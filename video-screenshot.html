<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>视频截图 - 工具箱</title>
  <style>
    :root {
      --bg: #f7f8fa; --surface: #fff; --border: #e8eaed;
      --text: #1f2329; --text-secondary: #646a73; --text-muted: #8f959e;
      --primary: #2563eb; --primary-light: #eff6ff;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 12px rgba(0,0,0,.04);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Segoe UI", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

    nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; height: 52px; display: flex; align-items: center; gap: 16px; }
    .back { text-decoration: none; color: var(--text-secondary); font-size: 13px; display: flex; align-items: center; gap: 4px; padding: 4px 8px; border-radius: 6px; }
    .back:hover { background: var(--bg); color: var(--text); }
    nav h1 { font-size: 15px; font-weight: 600; }

    .container { max-width: 780px; margin: 0 auto; padding: 24px; width: 100%; flex: 1; display: flex; flex-direction: column; gap: 16px; }

    .drop-zone { border: 2px dashed #c8cdd4; border-radius: var(--radius); padding: 48px 40px; text-align: center; color: var(--text-muted); font-size: 14px; cursor: pointer; transition: all .2s; background: var(--surface); }
    .drop-zone:hover, .drop-zone.drag-over { border-color: var(--primary); background: var(--primary-light); color: var(--primary); }
    .drop-zone.hidden { display: none; }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }

    .video-wrap { background: #000; display: flex; justify-content: center; }
    video { max-width: 100%; max-height: 360px; display: block; }

    .file-info { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-bottom: 1px solid var(--border); }
    .file-icon { width: 40px; height: 40px; background: var(--primary-light); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    .file-meta { flex: 1; min-width: 0; }
    .file-name { font-size: 14px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-detail { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
    button.sm-link { background: none; border: none; color: var(--text-muted); font-size: 12px; cursor: pointer; padding: 4px; text-decoration: underline; }
    button.sm-link:hover { color: var(--text); }

    .seek-section { padding: 16px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 10px; }
    .seek-row { display: flex; align-items: center; gap: 10px; }
    .seek-row input[type=range] { flex: 1; accent-color: var(--primary); }
    .seek-time { font-size: 13px; color: var(--text-secondary); font-variant-numeric: tabular-nums; min-width: 80px; text-align: center; }
    .seek-btns { display: flex; gap: 6px; flex-wrap: wrap; }
    .seek-btn { padding: 5px 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); font-size: 12px; cursor: pointer; }
    .seek-btn:hover { border-color: var(--primary); color: var(--primary); }

    .settings { padding: 16px; border-bottom: 1px solid var(--border); display: flex; gap: 14px; flex-wrap: wrap; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field > label { font-size: 12px; color: var(--text-muted); font-weight: 500; }
    .btn-group { display: flex; gap: 6px; }
    .opt-btn { padding: 7px 12px; border-radius: 8px; border: 1.5px solid var(--border); background: var(--bg); font-size: 13px; font-weight: 500; cursor: pointer; text-align: center; transition: all .15s; }
    .opt-btn.active { background: var(--primary-light); color: var(--primary); border-color: var(--primary); }
    .opt-btn:hover:not(.active) { border-color: #b0b8c8; }

    .captures { padding: 16px; border-bottom: 1px solid var(--border); display: none; }
    .captures-title { font-size: 13px; font-weight: 600; margin-bottom: 10px; }
    .captures-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
    .capture-item { border: 1px solid var(--border); border-radius: 8px; overflow: hidden; cursor: pointer; transition: box-shadow .15s; }
    .capture-item:hover { box-shadow: var(--shadow); }
    .capture-item img { width: 100%; display: block; }
    .capture-meta { padding: 6px 8px; font-size: 11px; color: var(--text-muted); display: flex; justify-content: space-between; align-items: center; }
    .capture-dl { color: #16a34a; font-weight: 500; cursor: pointer; text-decoration: none; border: none; background: none; font-size: 11px; }
    .capture-dl:hover { text-decoration: underline; }

    .actions { padding: 14px 16px; display: flex; gap: 10px; }
    button { padding: 8px 18px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); font-size: 13px; cursor: pointer; transition: all .15s; font-weight: 500; }
    button:hover:not(:disabled) { background: var(--bg); }
    button:disabled { opacity: .4; cursor: not-allowed; }
    button.primary { background: var(--primary); color: #fff; border-color: var(--primary); flex: 1; }
    button.primary:hover:not(:disabled) { background: #1d4ed8; }

    canvas { display: none; }
  </style>
</head>
<body>
<nav>
  <a href="index.html" class="back">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    返回
  </a>
  <h1>📸 视频截图</h1>
</nav>

<div class="container">
  <div class="drop-zone" id="drop-zone">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin-bottom:12px;opacity:.4"><rect x="3" y="3" width="18" height="18" rx="2"/><polygon points="5,17 10,12 13,15 17,10 22,17"/></svg>
    <div>拖放视频到此处，或<b>点击选择</b></div>
    <div style="font-size:12px;margin-top:6px;color:#aaa">支持 MP4、WebM、MOV 等常见格式</div>
  </div>
  <input type="file" id="file-input" accept="video/*" style="display:none">

  <div class="card" id="main-card" style="display:none">
    <div class="video-wrap">
      <video id="video" controls></video>
    </div>

    <div class="file-info">
      <div class="file-icon">🎬</div>
      <div class="file-meta">
        <div class="file-name" id="file-name"></div>
        <div class="file-detail" id="file-detail"></div>
      </div>
      <button class="sm-link" onclick="document.getElementById('file-input').click()">换一个</button>
    </div>

    <div class="seek-section">
      <div class="seek-row">
        <input type="range" id="seek-slider" min="0" max="100" step="0.01" value="0">
        <span class="seek-time" id="seek-time">00:00.0 / 00:00</span>
      </div>
      <div class="seek-btns">
        <button class="seek-btn" onclick="seekDelta(-5)">-5s</button>
        <button class="seek-btn" onclick="seekDelta(-1)">-1s</button>
        <button class="seek-btn" onclick="seekDelta(-0.1)">-0.1s</button>
        <button class="seek-btn" onclick="seekDelta(0.1)">+0.1s</button>
        <button class="seek-btn" onclick="seekDelta(1)">+1s</button>
        <button class="seek-btn" onclick="seekDelta(5)">+5s</button>
      </div>
    </div>

    <div class="settings">
      <div class="field">
        <label>图片格式</label>
        <div class="btn-group">
          <div class="opt-btn active" data-imgfmt="png">PNG</div>
          <div class="opt-btn" data-imgfmt="jpeg">JPEG</div>
        </div>
      </div>
    </div>

    <div class="captures" id="captures-section">
      <div class="captures-title" id="captures-title">已截取 0 张</div>
      <div class="captures-grid" id="captures-grid"></div>
    </div>

    <div class="actions">
      <button class="primary" onclick="captureFrame()">📸 截取当前帧</button>
    </div>
  </div>
</div>

<canvas id="canvas"></canvas>

<script>
  const video = document.getElementById('video');
  const captures = [];
  let imgFmt = 'png';

  const dz = document.getElementById('drop-zone');
  dz.addEventListener('click', () => document.getElementById('file-input').click());
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
  dz.addEventListener('drop', e => {
    e.preventDefault(); dz.classList.remove('drag-over');
    const f = [...e.dataTransfer.files].find(f => f.type.startsWith('video/'));
    if (f) loadFile(f);
  });
  document.addEventListener('dragover', e => e.preventDefault());
  document.addEventListener('drop', e => {
    e.preventDefault();
    const f = [...e.dataTransfer.files].find(f => f.type.startsWith('video/'));
    if (f) loadFile(f);
  });
  document.getElementById('file-input').addEventListener('change', e => {
    if (e.target.files[0]) loadFile(e.target.files[0]);
    e.target.value = '';
  });

  let currentFile = null;
  function loadFile(file) {
    currentFile = file;
    const url = URL.createObjectURL(file);
    video.src = url;
    video.onloadedmetadata = () => {
      document.getElementById('file-name').textContent = file.name;
      document.getElementById('file-detail').textContent =
        `${fmtSize(file.size)} · ${video.videoWidth}×${video.videoHeight} · ${fmtTime(video.duration)}`;
      document.getElementById('seek-slider').max = video.duration;
      updateSeekTime();
    };
    dz.classList.add('hidden');
    document.getElementById('main-card').style.display = '';
  }

  // seek
  const seekSlider = document.getElementById('seek-slider');
  seekSlider.addEventListener('input', () => {
    video.currentTime = parseFloat(seekSlider.value);
  });
  video.addEventListener('timeupdate', () => {
    seekSlider.value = video.currentTime;
    updateSeekTime();
  });

  function updateSeekTime() {
    document.getElementById('seek-time').textContent =
      `${fmtTimePrecise(video.currentTime)} / ${fmtTime(video.duration)}`;
  }

  function seekDelta(d) {
    video.currentTime = Math.max(0, Math.min(video.duration, video.currentTime + d));
  }

  // format
  document.querySelectorAll('[data-imgfmt]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-imgfmt]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      imgFmt = btn.dataset.imgfmt;
    });
  });

  // capture
  function captureFrame() {
    if (!video.videoWidth) return;
    const canvas = document.getElementById('canvas');
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0);

    const mime = imgFmt === 'jpeg' ? 'image/jpeg' : 'image/png';
    const quality = imgFmt === 'jpeg' ? 0.92 : undefined;
    const dataUrl = canvas.toDataURL(mime, quality);
    const time = video.currentTime;
    const baseName = currentFile ? currentFile.name.replace(/\.[^.]+$/, '') : 'frame';
    const filename = `${baseName}_${fmtTimeFile(time)}.${imgFmt}`;

    captures.push({ dataUrl, time, filename });
    renderCaptures();
  }

  function renderCaptures() {
    const section = document.getElementById('captures-section');
    const grid = document.getElementById('captures-grid');
    section.style.display = captures.length ? '' : 'none';
    document.getElementById('captures-title').textContent = `已截取 ${captures.length} 张`;
    grid.innerHTML = '';

    captures.forEach((cap, i) => {
      const div = document.createElement('div');
      div.className = 'capture-item';
      div.innerHTML = `
        <img src="${cap.dataUrl}">
        <div class="capture-meta">
          <span>${fmtTimePrecise(cap.time)}</span>
          <button class="capture-dl" data-i="${i}">⬇ 下载</button>
        </div>
      `;
      div.querySelector('.capture-dl').addEventListener('click', e => {
        e.stopPropagation();
        downloadCapture(i);
      });
      grid.appendChild(div);
    });
  }

  function downloadCapture(i) {
    const cap = captures[i];
    const a = document.createElement('a');
    a.href = cap.dataUrl;
    a.download = cap.filename;
    a.click();
  }

  function fmtTimePrecise(s) {
    if (!isFinite(s)) return '--:--.0';
    const m = Math.floor(s / 60), sec = s % 60;
    return `${String(m).padStart(2,'0')}:${sec < 10 ? '0' : ''}${sec.toFixed(1)}`;
  }
  function fmtTime(s) {
    if (!isFinite(s)) return '--:--';
    const m = Math.floor(s / 60), sec = Math.floor(s % 60);
    return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  }
  function fmtTimeFile(s) {
    const m = Math.floor(s / 60), sec = Math.floor(s % 60), ms = Math.floor((s % 1) * 10);
    return `${String(m).padStart(2,'0')}m${String(sec).padStart(2,'0')}s${ms}`;
  }
  function fmtSize(b) {
    if (b < 1024) return b + ' B';
    if (b < 1024 * 1024) return (b / 1024).toFixed(1) + ' KB';
    return (b / 1024 / 1024).toFixed(1) + ' MB';
  }
</script>
</body>
</html>
