<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>去除水印 - 工具箱</title>
  <style>
    :root {
      --bg: #f7f8fa; --surface: #fff; --border: #e8eaed;
      --text: #1f2329; --text-secondary: #646a73; --text-muted: #8f959e;
      --primary: #2563eb; --primary-light: #eff6ff;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 12px rgba(0,0,0,.04);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Segoe UI", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

    nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; height: 52px; display: flex; align-items: center; gap: 16px; }
    .back { text-decoration: none; color: var(--text-secondary); font-size: 13px; display: flex; align-items: center; gap: 4px; padding: 4px 8px; border-radius: 6px; }
    .back:hover { background: var(--bg); color: var(--text); }
    nav h1 { font-size: 15px; font-weight: 600; }

    .container { max-width: 1200px; margin: 0 auto; padding: 20px; width: 100%; flex: 1; display: flex; flex-direction: column; gap: 16px; }

    /* 提示条 */
    .notice { background: #fefce8; border: 1px solid #fde68a; border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #92400e; display: flex; align-items: flex-start; gap: 8px; }
    .notice strong { font-weight: 600; }

    .drop-zone { border: 2px dashed #c8cdd4; border-radius: var(--radius); padding: 60px 40px; text-align: center; color: var(--text-muted); font-size: 14px; cursor: pointer; transition: all .2s; background: var(--surface); }
    .drop-zone:hover, .drop-zone.drag-over { border-color: var(--primary); background: var(--primary-light); color: var(--primary); }
    .drop-zone.hidden { display: none; }

    .workspace { display: grid; grid-template-columns: 220px 1fr; gap: 16px; align-items: start; }
    @media (max-width: 700px) { .workspace { grid-template-columns: 1fr; } }

    /* 工具面板 */
    .panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); display: flex; flex-direction: column; gap: 14px; }
    .panel h2 { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; }

    .tool-group { display: flex; gap: 6px; }
    .tool-btn { flex: 1; padding: 8px 6px; border-radius: 8px; border: 1.5px solid var(--border); background: var(--bg); font-size: 12px; font-weight: 500; cursor: pointer; text-align: center; transition: all .15s; display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .tool-btn svg { display: block; }
    .tool-btn.active { background: var(--primary-light); color: var(--primary); border-color: var(--primary); }
    .tool-btn:hover:not(.active) { border-color: #b0b8c8; }

    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 12px; color: var(--text-muted); font-weight: 500; display: flex; justify-content: space-between; }
    .slider-row { display: flex; align-items: center; gap: 8px; }
    .slider-row input[type=range] { flex: 1; accent-color: var(--primary); }
    .slider-val { font-size: 12px; font-weight: 600; color: var(--primary); min-width: 28px; text-align: right; }

    button { padding: 7px 16px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); font-size: 13px; cursor: pointer; transition: all .15s; }
    button:hover:not(:disabled) { background: var(--bg); }
    button:disabled { opacity: .45; cursor: not-allowed; }
    button.primary { background: var(--primary); color: #fff; border-color: var(--primary); width: 100%; }
    button.primary:hover:not(:disabled) { background: #1d4ed8; }
    button.secondary { width: 100%; color: var(--text-secondary); }
    button.danger { color: #dc2626; }
    button.sm { padding: 5px 10px; font-size: 12px; }

    .divider { border: none; border-top: 1px solid var(--border); margin: 0; }

    /* 步骤指示 */
    .steps { display: flex; flex-direction: column; gap: 8px; }
    .step { display: flex; align-items: flex-start; gap: 8px; font-size: 12px; color: var(--text-secondary); line-height: 1.5; }
    .step-num { width: 18px; height: 18px; border-radius: 50%; background: var(--border); color: var(--text-muted); font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
    .step-num.done { background: #dcfce7; color: #16a34a; }
    .step-num.active { background: var(--primary); color: #fff; }

    /* 画布区 */
    .canvas-area { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }

    /* 比较滑块 */
    .compare-wrap { position: relative; display: inline-block; max-width: 100%; }
    .compare-wrap canvas { display: block; max-width: 100%; }
    #draw-canvas { position: absolute; top: 0; left: 0; cursor: crosshair; }
    #result-canvas { position: absolute; top: 0; left: 0; pointer-events: none; }
    .compare-slider { position: absolute; top: 0; bottom: 0; width: 3px; background: #fff; box-shadow: 0 0 6px rgba(0,0,0,.4); cursor: ew-resize; z-index: 10; display: none; }
    .compare-slider::before { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 28px; height: 28px; background: #fff; border-radius: 50%; box-shadow: 0 1px 6px rgba(0,0,0,.3); }
    .compare-slider::after { content: '◀ ▶'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, calc(-50% + 0px)); font-size: 9px; color: #888; white-space: nowrap; }

    /* 进행도 */
    .progress-wrap { padding: 24px; text-align: center; display: none; flex-direction: column; align-items: center; gap: 12px; }
    .progress-bar-outer { width: 200px; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .progress-bar-inner { height: 100%; background: var(--primary); border-radius: 3px; transition: width .1s; width: 0%; }
    .progress-text { font-size: 13px; color: var(--text-secondary); }

    .canvas-footer { display: flex; align-items: center; gap: 8px; padding: 10px 14px; border-top: 1px solid var(--border); flex-wrap: wrap; }
    .canvas-footer .info { font-size: 12px; color: var(--text-muted); flex: 1; }

    canvas { display: block; }
    #base-canvas { max-width: 100%; }
  </style>
</head>
<body>
<nav>
  <a href="index.html" class="back">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    返回
  </a>
  <h1>🪄 去除水印</h1>
</nav>

<div class="container">
  <div class="notice">
    <span>💡</span>
    <div><strong>适合场景：</strong>文字水印、半透明 Logo，背景较均匀时效果最好。复杂背景（人脸、精细纹理）处理后可能留有模糊痕迹。</div>
  </div>

  <div class="drop-zone" id="drop-zone">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin-bottom:12px;opacity:.4"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
    <div>拖放图片到此处，或<b>点击选择</b></div>
    <div style="font-size:12px;margin-top:6px;color:#aaa">支持 PNG、JPEG、WebP</div>
  </div>
  <input type="file" id="file-input" accept="image/*" style="display:none">

  <div id="workspace" class="workspace" style="display:none">
    <!-- 工具面板 -->
    <div class="panel">
      <div>
        <div class="steps" id="steps">
          <div class="step"><div class="step-num active" id="s1">1</div><span>用画笔涂抹水印区域（红色遮罩）</span></div>
          <div class="step"><div class="step-num" id="s2">2</div><span>点击「开始去除」</span></div>
          <div class="step"><div class="step-num" id="s3">3</div><span>拖动对比条查看效果，满意后下载</span></div>
        </div>
      </div>

      <hr class="divider">

      <div>
        <h2 style="margin-bottom:10px">工具</h2>
        <div class="tool-group">
          <div class="tool-btn active" id="btn-brush" onclick="setTool('brush')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19c-2.3 0-6.4-.2-8-2 2.8 0 4-1.3 4-3.5C8 11 6 9.5 6 7c0-3 2-4 6-4s6 1 6 4c0 2.5-2 4-2 6.5 0 2.2 1.2 3.5 4 3.5-1.6 1.8-5.7 2-8 2z"/></svg>
            画笔
          </div>
          <div class="tool-btn" id="btn-eraser" onclick="setTool('eraser')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"/><path d="M22 21H7"/><path d="m5 11 9 9"/></svg>
            橡皮
          </div>
        </div>
      </div>

      <div class="field">
        <label>笔刷大小 <span class="slider-val" id="size-val">24px</span></label>
        <input type="range" id="brush-size" min="4" max="120" value="24" style="accent-color:var(--primary)">
      </div>

      <div class="field">
        <label>填充强度</label>
        <div class="tool-group" style="gap:4px">
          <button class="sm active" id="q-fast" onclick="setQuality('fast',this)" style="flex:1">快速</button>
          <button class="sm" id="q-good" onclick="setQuality('good',this)" style="flex:1">精细</button>
        </div>
        <div style="font-size:11px;color:var(--text-muted);margin-top:4px" id="quality-hint">迭代50次，适合大多数场景</div>
      </div>

      <hr class="divider">

      <button class="secondary sm danger" onclick="clearMask()">清除标记</button>
      <button class="secondary sm" onclick="loadNew()">换一张图片</button>
      <button class="primary" id="btn-apply" onclick="applyInpaint()" disabled>🪄 开始去除</button>
      <button class="primary" id="btn-download" onclick="download()" disabled style="background:#16a34a;border-color:#16a34a;display:none">⬇ 下载结果</button>
    </div>

    <!-- 画布区 -->
    <div class="canvas-area">
      <div style="padding:14px;overflow:auto">
        <div class="compare-wrap" id="compare-wrap">
          <canvas id="base-canvas"></canvas>
          <canvas id="result-canvas" style="display:none"></canvas>
          <canvas id="draw-canvas"></canvas>
          <div class="compare-slider" id="compare-slider"></div>
        </div>
        <div class="progress-wrap" id="progress-wrap">
          <div class="progress-bar-outer"><div class="progress-bar-inner" id="progress-bar"></div></div>
          <div class="progress-text" id="progress-text">处理中…</div>
        </div>
      </div>
      <div class="canvas-footer">
        <span class="info" id="canvas-info">请先涂抹要去除的水印区域</span>
        <button class="sm" id="btn-compare" style="display:none" onclick="toggleCompare()">对比查看</button>
      </div>
    </div>
  </div>
</div>

<!-- 离屏画布 -->
<canvas id="offscreen" style="display:none"></canvas>

<script>
  // ── 状态 ──
  let img = null, imgFile = null;
  let scale = 1;
  let tool = 'brush';   // 'brush' | 'eraser'
  let quality = 'fast'; // 'fast' | 'good'
  let painting = false;
  let maskPixels = null; // Uint8Array, 1 = masked
  let resultData = null; // inpainted ImageData
  let compareMode = false;
  let comparePct = 50;
  let draggingCompare = false;
  let maskCount = 0;

  const baseCanvas = document.getElementById('base-canvas');
  const drawCanvas = document.getElementById('draw-canvas');
  const resultCanvas = document.getElementById('result-canvas');
  const compareSlider = document.getElementById('compare-slider');

  // ── 文件加载 ──
  const dz = document.getElementById('drop-zone');
  dz.addEventListener('click', () => document.getElementById('file-input').click());
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
  dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('drag-over'); const f = [...e.dataTransfer.files].find(f => f.type.startsWith('image/')); if (f) loadFile(f); });
  document.addEventListener('dragover', e => e.preventDefault());
  document.addEventListener('drop', e => { e.preventDefault(); const f = [...e.dataTransfer.files].find(f => f.type.startsWith('image/')); if (f) loadFile(f); });
  document.getElementById('file-input').addEventListener('change', e => { if (e.target.files[0]) loadFile(e.target.files[0]); e.target.value = ''; });

  function loadFile(file) {
    imgFile = file;
    const url = URL.createObjectURL(file);
    img = new Image();
    img.onload = () => {
      dz.classList.add('hidden');
      document.getElementById('workspace').style.display = 'grid';
      initCanvases();
      resetResult();
    };
    img.src = url;
  }

  function loadNew() { document.getElementById('file-input').click(); }

  function initCanvases() {
    const wrap = document.getElementById('compare-wrap');
    const maxW = wrap.parentElement.clientWidth - 28;
    const maxH = Math.max(400, window.innerHeight - 240);
    scale = Math.min(1, maxW / img.naturalWidth, maxH / img.naturalHeight);

    const dw = Math.round(img.naturalWidth * scale);
    const dh = Math.round(img.naturalHeight * scale);

    [baseCanvas, drawCanvas, resultCanvas].forEach(c => { c.width = dw; c.height = dh; });

    // 绘制原图到 base
    baseCanvas.getContext('2d').drawImage(img, 0, 0, dw, dh);

    // 重置 mask
    maskPixels = new Uint8Array(img.naturalWidth * img.naturalHeight);
    maskCount = 0;
    drawCanvas.getContext('2d').clearRect(0, 0, dw, dh);

    document.getElementById('canvas-info').textContent = `${img.naturalWidth} × ${img.naturalHeight} px · 请用画笔涂抹水印`;
  }

  window.addEventListener('resize', () => img && initCanvases());

  // ── 工具切换 ──
  function setTool(t) {
    tool = t;
    document.getElementById('btn-brush').classList.toggle('active', t === 'brush');
    document.getElementById('btn-eraser').classList.toggle('active', t === 'eraser');
    drawCanvas.style.cursor = t === 'brush' ? 'crosshair' : 'cell';
  }

  function setQuality(q, btn) {
    quality = q;
    document.querySelectorAll('#q-fast,#q-good').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('quality-hint').textContent = q === 'fast' ? '迭代50次，适合大多数场景' : '迭代200次，效果更细腻，稍慢';
  }

  document.getElementById('brush-size').addEventListener('input', function () {
    document.getElementById('size-val').textContent = this.value + 'px';
  });

  // ── 画笔交互 ──
  function getPos(e) {
    const r = drawCanvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: clientX - r.left, y: clientY - r.top };
  }

  function paintAt(cx, cy) {
    const brushR = parseInt(document.getElementById('brush-size').value) * scale / 2;
    const ctx = drawCanvas.getContext('2d');

    if (tool === 'brush') {
      ctx.globalCompositeOperation = 'source-over';
      ctx.fillStyle = 'rgba(220, 38, 38, 0.45)';
      ctx.beginPath(); ctx.arc(cx, cy, brushR, 0, Math.PI * 2); ctx.fill();
    } else {
      ctx.globalCompositeOperation = 'destination-out';
      ctx.beginPath(); ctx.arc(cx, cy, brushR, 0, Math.PI * 2); ctx.fill();
      ctx.globalCompositeOperation = 'source-over';
    }

    // 同步到 maskPixels（原图坐标）
    const ix = Math.round(cx / scale), iy = Math.round(cy / scale);
    const ir = Math.round(brushR / scale);
    for (let dy = -ir; dy <= ir; dy++) {
      for (let dx = -ir; dx <= ir; dx++) {
        if (dx * dx + dy * dy > ir * ir) continue;
        const nx = ix + dx, ny = iy + dy;
        if (nx < 0 || nx >= img.naturalWidth || ny < 0 || ny >= img.naturalHeight) continue;
        const idx = ny * img.naturalWidth + nx;
        if (tool === 'brush') { if (!maskPixels[idx]) { maskPixels[idx] = 1; maskCount++; } }
        else { if (maskPixels[idx]) { maskPixels[idx] = 0; maskCount--; } }
      }
    }
    updateApplyBtn();
  }

  drawCanvas.addEventListener('mousedown', e => { painting = true; paintAt(...Object.values(getPos(e))); });
  drawCanvas.addEventListener('mousemove', e => { if (painting) paintAt(...Object.values(getPos(e))); });
  window.addEventListener('mouseup', () => { painting = false; });
  drawCanvas.addEventListener('touchstart', e => { e.preventDefault(); painting = true; paintAt(...Object.values(getPos(e))); }, { passive: false });
  drawCanvas.addEventListener('touchmove', e => { e.preventDefault(); if (painting) paintAt(...Object.values(getPos(e))); }, { passive: false });
  window.addEventListener('touchend', () => { painting = false; });

  function updateApplyBtn() {
    const btn = document.getElementById('btn-apply');
    btn.disabled = maskCount === 0;
    if (maskCount > 0) setStep(2);
  }

  function clearMask() {
    drawCanvas.getContext('2d').clearRect(0, 0, drawCanvas.width, drawCanvas.height);
    maskPixels = new Uint8Array(img.naturalWidth * img.naturalHeight);
    maskCount = 0;
    updateApplyBtn();
    setStep(1);
  }

  // ── 步骤指示 ──
  function setStep(n) {
    for (let i = 1; i <= 3; i++) {
      const el = document.getElementById('s' + i);
      el.className = 'step-num' + (i < n ? ' done' : i === n ? ' active' : '');
      el.textContent = i < n ? '✓' : i;
    }
  }

  // ── Inpainting ──
  function applyInpaint() {
    if (maskCount === 0) return;

    // 显示进度
    drawCanvas.style.pointerEvents = 'none';
    document.getElementById('btn-apply').disabled = true;
    const pw = document.getElementById('progress-wrap');
    const pb = document.getElementById('progress-bar');
    pw.style.display = 'flex';
    document.querySelector('.compare-wrap').style.opacity = '0.4';

    // 获取原图 imageData
    const off = document.getElementById('offscreen');
    off.width = img.naturalWidth; off.height = img.naturalHeight;
    const offCtx = off.getContext('2d');
    offCtx.drawImage(img, 0, 0);
    const imageData = offCtx.getImageData(0, 0, img.naturalWidth, img.naturalHeight);

    const iterations = quality === 'fast' ? 50 : 200;

    // Web Worker (inline)
    const workerSrc = `
      self.onmessage = function(e) {
        const { buf, mask, width, height, iterations } = e.data;
        const data = new Uint8ClampedArray(buf);
        const W = width, H = height;

        // 第一步：用扩展环采样初始化每个 mask 像素
        // 按到边界距离排序（BFS 从边界向内）
        const dist = new Float32Array(W * H).fill(Infinity);
        const queue = [];

        for (let i = 0; i < W * H; i++) {
          if (!mask[i]) continue;
          const x = i % W, y = Math.floor(i / W);
          let onBoundary = false;
          for (let dy = -1; dy <= 1 && !onBoundary; dy++) {
            for (let dx = -1; dx <= 1 && !onBoundary; dx++) {
              if (dx === 0 && dy === 0) continue;
              const nx = x + dx, ny = y + dy;
              if (nx < 0 || nx >= W || ny < 0 || ny >= H) continue;
              if (!mask[ny * W + nx]) onBoundary = true;
            }
          }
          if (onBoundary) { dist[i] = 0; queue.push(i); }
        }

        // BFS 扩散距离
        let head = 0;
        while (head < queue.length) {
          const i = queue[head++];
          const x = i % W, y = Math.floor(i / W);
          for (let dy = -1; dy <= 1; dy++) {
            for (let dx = -1; dx <= 1; dx++) {
              if (dx === 0 && dy === 0) continue;
              const nx = x + dx, ny = y + dy;
              if (nx < 0 || nx >= W || ny < 0 || ny >= H) continue;
              const ni = ny * W + nx;
              if (!mask[ni] || dist[ni] <= dist[i] + 1) continue;
              dist[ni] = dist[i] + 1;
              queue.push(ni);
            }
          }
        }

        // 按距离从小到大处理（边界先填）
        queue.sort((a, b) => dist[a] - dist[b]);

        // 初始填充：从非 mask 邻域采样
        for (const i of queue) {
          const x = i % W, y = Math.floor(i / W);
          let r = 0, g = 0, b = 0, w = 0;
          const radius = Math.ceil(dist[i]) + 1;
          for (let dy = -radius; dy <= radius; dy++) {
            for (let dx = -radius; dx <= radius; dx++) {
              const nx = x + dx, ny = y + dy;
              if (nx < 0 || nx >= W || ny < 0 || ny >= H) continue;
              const ni = ny * W + nx;
              if (mask[ni]) continue;
              const weight = 1.0 / (dx * dx + dy * dy + 0.001);
              r += data[ni * 4] * weight;
              g += data[ni * 4 + 1] * weight;
              b += data[ni * 4 + 2] * weight;
              w += weight;
            }
          }
          if (w > 0) {
            data[i * 4] = r / w;
            data[i * 4 + 1] = g / w;
            data[i * 4 + 2] = b / w;
          }
        }

        self.postMessage({ type: 'progress', value: 30 });

        // 迭代扩散平滑
        const tmp = new Uint8ClampedArray(data);
        const reportEvery = Math.max(1, Math.floor(iterations / 10));
        for (let iter = 0; iter < iterations; iter++) {
          for (const i of queue) {
            const x = i % W, y = Math.floor(i / W);
            let r = 0, g = 0, b = 0, cnt = 0;
            for (let dy = -1; dy <= 1; dy++) {
              for (let dx = -1; dx <= 1; dx++) {
                if (dx === 0 && dy === 0) continue;
                const nx = x + dx, ny = y + dy;
                if (nx < 0 || nx >= W || ny < 0 || ny >= H) continue;
                const ni = ny * W + nx;
                r += data[ni * 4]; g += data[ni * 4 + 1]; b += data[ni * 4 + 2]; cnt++;
              }
            }
            if (cnt > 0) { tmp[i * 4] = r / cnt; tmp[i * 4 + 1] = g / cnt; tmp[i * 4 + 2] = b / cnt; }
          }
          for (const i of queue) { data[i * 4] = tmp[i * 4]; data[i * 4 + 1] = tmp[i * 4 + 1]; data[i * 4 + 2] = tmp[i * 4 + 2]; }
          if (iter % reportEvery === 0) {
            self.postMessage({ type: 'progress', value: 30 + Math.round((iter / iterations) * 65) });
          }
        }

        self.postMessage({ type: 'done', buf: data.buffer }, [data.buffer]);
      };
    `;
    const blob = new Blob([workerSrc], { type: 'application/javascript' });
    const worker = new Worker(URL.createObjectURL(blob));

    worker.onmessage = e => {
      if (e.data.type === 'progress') {
        pb.style.width = e.data.value + '%';
        document.getElementById('progress-text').textContent = `处理中… ${e.data.value}%`;
      } else if (e.data.type === 'done') {
        pb.style.width = '100%';
        setTimeout(() => {
          const result = new ImageData(new Uint8ClampedArray(e.data.buf), img.naturalWidth, img.naturalHeight);
          resultData = result;

          // 渲染到 resultCanvas（scaled）
          const tmpCanvas = document.createElement('canvas');
          tmpCanvas.width = img.naturalWidth; tmpCanvas.height = img.naturalHeight;
          tmpCanvas.getContext('2d').putImageData(result, 0, 0);

          resultCanvas.width = drawCanvas.width; resultCanvas.height = drawCanvas.height;
          resultCanvas.getContext('2d').drawImage(tmpCanvas, 0, 0, resultCanvas.width, resultCanvas.height);
          resultCanvas.style.display = 'block';

          // 清除 mask 遮罩
          drawCanvas.getContext('2d').clearRect(0, 0, drawCanvas.width, drawCanvas.height);
          drawCanvas.style.pointerEvents = 'auto';

          // 显示结果
          pw.style.display = 'none';
          document.querySelector('.compare-wrap').style.opacity = '1';

          compareSlider.style.display = 'block';
          comparePct = 50;
          compareSlider.style.left = comparePct + '%';
          applyCompareClip();

          document.getElementById('btn-compare').style.display = '';
          document.getElementById('btn-apply').disabled = false;
          document.getElementById('btn-download').style.display = '';
          document.getElementById('btn-download').disabled = false;

          setStep(3);
          worker.terminate();
        }, 100);
      }
    };

    worker.postMessage({
      buf: imageData.data.buffer,
      mask: maskPixels.buffer,
      width: img.naturalWidth,
      height: img.naturalHeight,
      iterations,
    }, [imageData.data.buffer, maskPixels.buffer]);

    // 重新分配 maskPixels（已转移所有权）
    maskPixels = new Uint8Array(img.naturalWidth * img.naturalHeight);
  }

  // ── 对比滑块 ──
  function applyCompareClip() {
    const pct = comparePct;
    // result 盖在 base 上，用 clip 显示左侧 pct% 为结果
    resultCanvas.style.clipPath = `inset(0 ${100 - pct}% 0 0)`;
    compareSlider.style.left = pct + '%';
  }

  function toggleCompare() {
    compareMode = !compareMode;
    document.getElementById('btn-compare').textContent = compareMode ? '退出对比' : '对比查看';
    if (compareMode) {
      resultCanvas.style.display = 'block';
      compareSlider.style.display = 'block';
      comparePct = 50;
      applyCompareClip();
    } else {
      resultCanvas.style.display = 'block';
      resultCanvas.style.clipPath = 'none';
      compareSlider.style.display = 'none';
    }
  }

  compareSlider.addEventListener('mousedown', e => { draggingCompare = true; e.preventDefault(); });
  window.addEventListener('mousemove', e => {
    if (!draggingCompare) return;
    const wrap = document.getElementById('compare-wrap');
    const r = wrap.getBoundingClientRect();
    comparePct = Math.max(0, Math.min(100, (e.clientX - r.left) / r.width * 100));
    applyCompareClip();
  });
  window.addEventListener('mouseup', () => { draggingCompare = false; });

  compareSlider.addEventListener('touchstart', e => { draggingCompare = true; e.preventDefault(); }, { passive: false });
  window.addEventListener('touchmove', e => {
    if (!draggingCompare) return;
    const wrap = document.getElementById('compare-wrap');
    const r = wrap.getBoundingClientRect();
    comparePct = Math.max(0, Math.min(100, (e.touches[0].clientX - r.left) / r.width * 100));
    applyCompareClip();
  });
  window.addEventListener('touchend', () => { draggingCompare = false; });

  // ── 下载 ──
  function download() {
    if (!resultData) return;
    const off = document.getElementById('offscreen');
    off.width = img.naturalWidth; off.height = img.naturalHeight;
    off.getContext('2d').putImageData(resultData, 0, 0);
    const ext = imgFile.name.match(/\.png$/i) ? 'png' : imgFile.name.match(/\.webp$/i) ? 'webp' : 'jpg';
    const mime = ext === 'png' ? 'image/png' : ext === 'webp' ? 'image/webp' : 'image/jpeg';
    const name = imgFile.name.replace(/\.[^.]+$/, '') + '_no_watermark.' + ext;
    off.toBlob(blob => {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = name;
      a.click();
    }, mime, 0.96);
  }

  function resetResult() {
    resultData = null;
    resultCanvas.style.display = 'none';
    compareSlider.style.display = 'none';
    document.getElementById('btn-compare').style.display = 'none';
    document.getElementById('btn-download').style.display = 'none';
    setStep(1);
  }
</script>
</body>
</html>
