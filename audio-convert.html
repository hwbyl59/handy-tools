<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>音频格式转换 - 工具箱</title>
  <script src="https://cdn.jsdelivr.net/npm/lamejs@1.2.1/lame.min.js"></script>
  <style>
    :root {
      --bg: #f7f8fa; --surface: #fff; --border: #e8eaed;
      --text: #1f2329; --text-secondary: #646a73; --text-muted: #8f959e;
      --primary: #2563eb; --primary-light: #eff6ff;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 12px rgba(0,0,0,.04);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Segoe UI", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

    nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; height: 52px; display: flex; align-items: center; gap: 16px; }
    .back { text-decoration: none; color: var(--text-secondary); font-size: 13px; display: flex; align-items: center; gap: 4px; padding: 4px 8px; border-radius: 6px; }
    .back:hover { background: var(--bg); color: var(--text); }
    nav h1 { font-size: 15px; font-weight: 600; }

    .container { max-width: 780px; margin: 0 auto; padding: 24px; width: 100%; flex: 1; display: flex; flex-direction: column; gap: 16px; }

    .drop-zone { border: 2px dashed #c8cdd4; border-radius: var(--radius); padding: 48px 40px; text-align: center; color: var(--text-muted); font-size: 14px; cursor: pointer; transition: all .2s; background: var(--surface); }
    .drop-zone:hover, .drop-zone.drag-over { border-color: var(--primary); background: var(--primary-light); color: var(--primary); }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }

    /* 设置区 */
    .settings { padding: 16px; display: flex; flex-direction: column; gap: 14px; border-bottom: 1px solid var(--border); }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field > label { font-size: 12px; color: var(--text-muted); font-weight: 500; }
    .btn-group { display: flex; gap: 6px; }
    .opt-btn { flex: 1; padding: 7px 10px; border-radius: 8px; border: 1.5px solid var(--border); background: var(--bg); font-size: 13px; font-weight: 500; cursor: pointer; text-align: center; transition: all .15s; }
    .opt-btn.active { background: var(--primary-light); color: var(--primary); border-color: var(--primary); }
    .opt-btn:hover:not(.active) { border-color: #b0b8c8; }

    /* 文件列表 */
    .list-header { display: flex; align-items: center; padding: 12px 16px; border-bottom: 1px solid var(--border); gap: 8px; }
    .list-header .title { font-size: 13px; font-weight: 600; flex: 1; }
    button.sm-link { background: none; border: none; color: var(--text-muted); font-size: 12px; cursor: pointer; padding: 4px 6px; text-decoration: underline; }
    button.sm-link:hover { color: var(--text); }

    .file-list { list-style: none; }
    .file-item { display: flex; align-items: center; gap: 12px; padding: 10px 16px; border-bottom: 1px solid var(--border); }
    .file-item:last-child { border-bottom: none; }

    .file-item .icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
    .file-item .meta { flex: 1; min-width: 0; }
    .file-item .name { font-size: 13px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-item .detail { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    .file-item .status-badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; flex-shrink: 0; font-weight: 500; }
    .badge-pending { background: var(--bg); color: var(--text-muted); border: 1px solid var(--border); }
    .badge-processing { background: #eff6ff; color: var(--primary); border: 1px solid #bfdbfe; }
    .badge-done { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
    .badge-error { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }

    .item-progress { width: 60px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; flex-shrink: 0; }
    .item-progress-inner { height: 100%; background: var(--primary); border-radius: 2px; transition: width .15s; }

    .item-btn { background: none; border: none; width: 26px; height: 26px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 14px; transition: all .1s; flex-shrink: 0; }
    .item-btn:hover { background: var(--bg); color: var(--text); }
    .item-dl { background: none; border: none; cursor: pointer; font-size: 12px; color: #16a34a; font-weight: 500; padding: 4px 8px; border-radius: 6px; flex-shrink: 0; text-decoration: none; }
    .item-dl:hover { background: #f0fdf4; }

    /* 底部 */
    .actions { padding: 14px 16px; border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: center; }
    .actions .status { flex: 1; font-size: 13px; color: var(--text-secondary); }
    button { padding: 8px 18px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); font-size: 13px; cursor: pointer; transition: all .15s; font-weight: 500; }
    button:hover:not(:disabled) { background: var(--bg); }
    button:disabled { opacity: .4; cursor: not-allowed; }
    button.primary { background: var(--primary); color: #fff; border-color: var(--primary); }
    button.primary:hover:not(:disabled) { background: #1d4ed8; }
    button.download-all { background: #16a34a; color: #fff; border-color: #16a34a; }
    button.download-all:hover:not(:disabled) { background: #15803d; }
  </style>
</head>
<body>
<nav>
  <a href="index.html" class="back">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    返回
  </a>
  <h1>🔄 音频格式转换</h1>
</nav>

<div class="container">
  <div class="drop-zone" id="drop-zone">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin-bottom:12px;opacity:.4"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
    <div>拖放音频文件到此处，或<b>点击选择</b></div>
    <div style="font-size:12px;margin-top:6px;color:#aaa">支持 MP3、WAV、OGG、AAC、M4A、FLAC 等，可批量添加</div>
  </div>
  <input type="file" id="file-input" accept="audio/*" multiple style="display:none">

  <div class="card" id="main-card" style="display:none">
    <!-- 设置 -->
    <div class="settings">
      <div class="field">
        <label>输出格式</label>
        <div class="btn-group">
          <div class="opt-btn active" data-fmt="mp3">MP3</div>
          <div class="opt-btn" data-fmt="wav">WAV（无损）</div>
        </div>
      </div>
      <div class="field" id="bitrate-field">
        <label>MP3 码率</label>
        <div class="btn-group">
          <div class="opt-btn" data-br="128">128 kbps</div>
          <div class="opt-btn active" data-br="192">192 kbps</div>
          <div class="opt-btn" data-br="320">320 kbps</div>
        </div>
      </div>
      <div class="field" id="channel-field">
        <label>声道</label>
        <div class="btn-group">
          <div class="opt-btn active" data-ch="auto">保持原声道</div>
          <div class="opt-btn" data-ch="stereo">立体声</div>
          <div class="opt-btn" data-ch="mono">单声道</div>
        </div>
      </div>
      <div class="field" id="samplerate-field">
        <label>采样率</label>
        <div class="btn-group">
          <div class="opt-btn active" data-sr="auto">保持原采样率</div>
          <div class="opt-btn" data-sr="44100">44.1 kHz</div>
          <div class="opt-btn" data-sr="48000">48 kHz</div>
        </div>
      </div>
    </div>

    <!-- 文件列表 -->
    <div class="list-header">
      <span class="title" id="list-title">文件列表</span>
      <button class="sm-link" onclick="addMore()">+ 添加更多</button>
      <button class="sm-link" onclick="clearAll()" style="color:#dc2626">清空</button>
    </div>
    <ul class="file-list" id="file-list"></ul>

    <!-- 底部操作 -->
    <div class="actions">
      <span class="status" id="status-text">共 0 个文件</span>
      <button class="primary" id="btn-convert" onclick="convertAll()">开始转换</button>
      <button class="download-all" id="btn-download-all" onclick="downloadAll()" disabled style="display:none">⬇ 全部下载</button>
    </div>
  </div>
</div>

<script>
  const items = []; // { file, buffer, blob, status, progress, error }
  let currentFmt = 'mp3';
  let currentBr = 192;
  let currentCh = 'auto';
  let currentSr = 'auto';
  let converting = false;

  const dz = document.getElementById('drop-zone');
  const fileInput = document.getElementById('file-input');

  // ── 文件加载 ──
  dz.addEventListener('click', () => fileInput.click());
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
  dz.addEventListener('drop', e => {
    e.preventDefault(); dz.classList.remove('drag-over');
    const files = [...e.dataTransfer.files].filter(f => f.type.startsWith('audio/'));
    if (files.length) addFiles(files);
  });
  document.addEventListener('dragover', e => e.preventDefault());
  document.addEventListener('drop', e => {
    e.preventDefault();
    const files = [...e.dataTransfer.files].filter(f => f.type.startsWith('audio/'));
    if (files.length) addFiles(files);
  });
  fileInput.addEventListener('change', e => {
    if (e.target.files.length) addFiles([...e.target.files]);
    e.target.value = '';
  });

  function addMore() { fileInput.click(); }

  async function addFiles(files) {
    document.getElementById('main-card').style.display = '';

    for (const file of files) {
      const item = { file, buffer: null, blob: null, status: 'decoding', progress: 0, error: null, duration: 0, sampleRate: 0, channels: 0 };
      items.push(item);
      renderList();

      try {
        const arrayBuffer = await file.arrayBuffer();
        const ctx = new AudioContext();
        item.buffer = await ctx.decodeAudioData(arrayBuffer);
        item.duration = item.buffer.duration;
        item.sampleRate = item.buffer.sampleRate;
        item.channels = item.buffer.numberOfChannels;
        item.status = 'pending';
        await ctx.close();
      } catch (err) {
        item.status = 'error';
        item.error = '解码失败';
        console.error('Decode failed:', file.name, err);
      }
      renderList();
    }
  }

  function clearAll() {
    items.length = 0;
    renderList();
    document.getElementById('main-card').style.display = 'none';
    document.getElementById('btn-download-all').style.display = 'none';
    document.getElementById('btn-download-all').disabled = true;
  }

  function removeItem(index) {
    items.splice(index, 1);
    renderList();
    if (items.length === 0) {
      document.getElementById('main-card').style.display = 'none';
    }
  }

  // ── 列表渲染 ──
  function renderList() {
    const list = document.getElementById('file-list');
    list.innerHTML = '';

    items.forEach((item, i) => {
      const li = document.createElement('li');
      li.className = 'file-item';

      const ext = item.file.name.split('.').pop().toUpperCase();
      const infoStr = item.buffer
        ? `${ext} · ${fmtSize(item.file.size)} · ${fmtTime(item.duration)} · ${item.sampleRate} Hz · ${item.channels === 1 ? '单声道' : '立体声'}`
        : `${ext} · ${fmtSize(item.file.size)}`;

      let statusHtml = '';
      if (item.status === 'decoding') {
        statusHtml = '<span class="status-badge badge-processing">解码中</span>';
      } else if (item.status === 'pending') {
        statusHtml = '<span class="status-badge badge-pending">待转换</span>';
      } else if (item.status === 'converting') {
        statusHtml = `<div class="item-progress"><div class="item-progress-inner" style="width:${item.progress}%"></div></div>
                      <span class="status-badge badge-processing">${item.progress}%</span>`;
      } else if (item.status === 'done') {
        const outSize = item.blob ? fmtSize(item.blob.size) : '';
        statusHtml = `<span class="status-badge badge-done">${outSize}</span>`;
      } else if (item.status === 'error') {
        statusHtml = `<span class="status-badge badge-error">${item.error || '失败'}</span>`;
      }

      let actionHtml = '';
      if (item.status === 'done' && item.blob) {
        actionHtml = `<button class="item-dl" data-i="${i}">⬇ 下载</button>`;
      }
      if (!converting) {
        actionHtml += `<button class="item-btn" onclick="removeItem(${i})" title="删除">✕</button>`;
      }

      li.innerHTML = `
        <div class="icon" style="background:var(--primary-light)">🎵</div>
        <div class="meta">
          <div class="name">${escHtml(item.file.name)}</div>
          <div class="detail">${infoStr}</div>
        </div>
        ${statusHtml}
        ${actionHtml}
      `;

      const dlBtn = li.querySelector('.item-dl');
      if (dlBtn) dlBtn.addEventListener('click', () => downloadOne(i));

      list.appendChild(li);
    });

    const total = items.length;
    const done = items.filter(it => it.status === 'done').length;
    document.getElementById('list-title').textContent = `文件列表（${total}）`;
    if (done > 0 && done < total) {
      document.getElementById('status-text').textContent = `已完成 ${done} / ${total}`;
    } else {
      document.getElementById('status-text').textContent = `共 ${total} 个文件`;
    }
  }

  // ── 选项切换 ──
  document.querySelectorAll('[data-fmt]').forEach(btn => {
    btn.addEventListener('click', () => {
      if (converting) return;
      document.querySelectorAll('[data-fmt]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFmt = btn.dataset.fmt;
      document.getElementById('bitrate-field').style.display = currentFmt === 'wav' ? 'none' : '';
    });
  });
  document.querySelectorAll('[data-br]').forEach(btn => {
    btn.addEventListener('click', () => {
      if (converting) return;
      document.querySelectorAll('[data-br]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentBr = parseInt(btn.dataset.br);
    });
  });
  document.querySelectorAll('[data-ch]').forEach(btn => {
    btn.addEventListener('click', () => {
      if (converting) return;
      document.querySelectorAll('[data-ch]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentCh = btn.dataset.ch;
    });
  });
  document.querySelectorAll('[data-sr]').forEach(btn => {
    btn.addEventListener('click', () => {
      if (converting) return;
      document.querySelectorAll('[data-sr]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentSr = btn.dataset.sr;
    });
  });

  // ── 批量转换 ──
  async function convertAll() {
    const pending = items.filter(it => it.buffer && it.status !== 'done');
    if (pending.length === 0) { alert('没有需要转换的文件'); return; }

    converting = true;
    document.getElementById('btn-convert').disabled = true;
    document.getElementById('btn-download-all').style.display = 'none';

    for (const item of pending) {
      item.status = 'converting';
      item.progress = 0;
      renderList();

      try {
        // resample / remix if needed
        const targetSr = currentSr === 'auto' ? item.buffer.sampleRate : parseInt(currentSr);
        const targetCh = currentCh === 'auto' ? item.buffer.numberOfChannels : (currentCh === 'mono' ? 1 : 2);

        let buf = item.buffer;
        if (buf.sampleRate !== targetSr || buf.numberOfChannels !== targetCh) {
          buf = await resample(buf, targetSr, targetCh);
        }

        if (currentFmt === 'wav') {
          item.blob = encodeWav(buf, p => { item.progress = Math.round(p * 100); renderList(); });
        } else {
          item.blob = await encodeMp3(buf, currentBr, p => { item.progress = Math.round(p * 100); renderList(); });
        }

        item.status = 'done';
      } catch (err) {
        item.status = 'error';
        item.error = '转换失败';
        console.error('Convert failed:', item.file.name, err);
      }
      renderList();
    }

    converting = false;
    document.getElementById('btn-convert').disabled = false;

    const doneCount = items.filter(it => it.status === 'done').length;
    if (doneCount > 1) {
      document.getElementById('btn-download-all').style.display = '';
      document.getElementById('btn-download-all').disabled = false;
    }
    renderList();
  }

  // ── 重采样 / 声道转换 ──
  async function resample(audioBuffer, targetSr, targetCh) {
    const duration = audioBuffer.duration;
    const length = Math.round(duration * targetSr);
    const offCtx = new OfflineAudioContext(targetCh, length, targetSr);
    const source = offCtx.createBufferSource();
    source.buffer = audioBuffer;
    source.connect(offCtx.destination);
    source.start();
    return await offCtx.startRendering();
  }

  // ── WAV 编码 ──
  function encodeWav(audioBuffer, onProgress) {
    const numCh = Math.min(audioBuffer.numberOfChannels, 2);
    const sr = audioBuffer.sampleRate;
    const left = audioBuffer.getChannelData(0);
    const right = numCh >= 2 ? audioBuffer.getChannelData(1) : left;
    const samples = left.length;
    const bytePerSample = 2;
    const dataLen = samples * numCh * bytePerSample;
    const buffer = new ArrayBuffer(44 + dataLen);
    const view = new DataView(buffer);
    const write = (off, str) => { for (let i = 0; i < str.length; i++) view.setUint8(off + i, str.charCodeAt(i)); };
    write(0, 'RIFF'); view.setUint32(4, 36 + dataLen, true);
    write(8, 'WAVE'); write(12, 'fmt ');
    view.setUint32(16, 16, true); view.setUint16(20, 1, true);
    view.setUint16(22, numCh, true); view.setUint32(24, sr, true);
    view.setUint32(28, sr * numCh * bytePerSample, true);
    view.setUint16(32, numCh * bytePerSample, true); view.setUint16(34, 16, true);
    write(36, 'data'); view.setUint32(40, dataLen, true);
    let offset = 44;
    for (let i = 0; i < samples; i++) {
      view.setInt16(offset, clamp16(left[i]), true); offset += 2;
      if (numCh >= 2) { view.setInt16(offset, clamp16(right[i]), true); offset += 2; }
    }
    onProgress && onProgress(1);
    return new Blob([buffer], { type: 'audio/wav' });
  }

  // ── MP3 编码 (lamejs) ──
  async function encodeMp3(audioBuffer, bitrate, onProgress) {
    const numCh = Math.min(audioBuffer.numberOfChannels, 2);
    const sr = audioBuffer.sampleRate;
    const left = float32ToInt16(audioBuffer.getChannelData(0));
    const right = numCh >= 2 ? float32ToInt16(audioBuffer.getChannelData(1)) : left;

    const encoder = new lamejs.Mp3Encoder(numCh, sr, bitrate);
    const mp3Parts = [];
    const chunkSize = 1152;
    const total = left.length;

    for (let i = 0; i < total; i += chunkSize) {
      const l = left.subarray(i, i + chunkSize);
      const r = right.subarray(i, i + chunkSize);
      const buf = numCh === 1 ? encoder.encodeBuffer(l) : encoder.encodeBuffer(l, r);
      if (buf.length > 0) mp3Parts.push(buf);

      if (i % (chunkSize * 50) === 0) {
        onProgress(i / total);
        await new Promise(r => setTimeout(r, 0));
      }
    }

    const tail = encoder.flush();
    if (tail.length > 0) mp3Parts.push(tail);
    onProgress(1);
    return new Blob(mp3Parts, { type: 'audio/mpeg' });
  }

  // ── 下载 ──
  function downloadOne(index) {
    const item = items[index];
    if (!item || !item.blob) return;
    const name = item.file.name.replace(/\.[^.]+$/, '') + '.' + currentFmt;
    const a = document.createElement('a');
    a.href = URL.createObjectURL(item.blob);
    a.download = name;
    a.click();
  }

  function downloadAll() {
    items.forEach((item, i) => {
      if (item.status === 'done' && item.blob) {
        setTimeout(() => downloadOne(i), i * 200);
      }
    });
  }

  // ── 工具函数 ──
  function float32ToInt16(f32) {
    const i16 = new Int16Array(f32.length);
    for (let i = 0; i < f32.length; i++) i16[i] = clamp16(f32[i]);
    return i16;
  }

  function clamp16(v) {
    const s = Math.max(-1, Math.min(1, v));
    return s < 0 ? s * 0x8000 : s * 0x7FFF;
  }

  function fmtTime(s) {
    if (!isFinite(s)) return '--:--';
    const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = Math.floor(s % 60);
    if (h > 0) return `${h}:${String(m).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
    return `${String(m).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
  }

  function fmtSize(b) {
    if (b < 1024) return b + ' B';
    if (b < 1024 * 1024) return (b / 1024).toFixed(1) + ' KB';
    return (b / 1024 / 1024).toFixed(1) + ' MB';
  }

  function escHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }
</script>
</body>
</html>
