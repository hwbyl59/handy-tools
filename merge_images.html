<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>图片合并工具</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    header h1 { font-size: 16px; font-weight: 600; margin-right: 8px; }

    .toolbar-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toolbar-group label { font-size: 13px; color: #555; }

    button {
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid #d0d0d0;
      background: #fff;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #f0f0f0; }
    button.primary {
      background: #1a73e8;
      color: #fff;
      border-color: #1a73e8;
    }
    button.primary:hover { background: #1765cc; }
    button.danger { color: #d32f2f; }
    button.sm { padding: 3px 8px; font-size: 12px; }

    select {
      padding: 5px 8px;
      border-radius: 6px;
      border: 1px solid #d0d0d0;
      font-size: 13px;
      background: #fff;
    }

    /* 拖放区 */
    #drop-zone {
      margin: 20px;
      border: 2px dashed #b0b0b0;
      border-radius: 12px;
      padding: 32px;
      text-align: center;
      color: #888;
      font-size: 14px;
      transition: border-color 0.2s, background 0.2s;
      cursor: pointer;
    }
    #drop-zone.drag-over {
      border-color: #1a73e8;
      background: #e8f0fe;
      color: #1a73e8;
    }
    #drop-zone.hidden { display: none; }

    /* 图片列表 */
    #image-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 0 20px 20px;
      flex: 1;
    }

    .image-item {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: grab;
      transition: box-shadow 0.15s;
      user-select: none;
    }
    .image-item:active { cursor: grabbing; }
    .image-item.dragging { opacity: 0.4; }
    .image-item.drag-target { box-shadow: 0 0 0 2px #1a73e8; }

    .image-item img {
      width: 56px;
      height: 56px;
      object-fit: contain;
      border-radius: 4px;
      background: #f5f5f5;
      flex-shrink: 0;
    }

    .image-info { flex: 1; min-width: 0; }
    .image-name {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .image-meta { font-size: 12px; color: #888; margin-top: 2px; }

    .image-actions { display: flex; gap: 4px; flex-shrink: 0; }

    /* 底部操作栏 */
    footer {
      position: sticky;
      bottom: 0;
      background: #fff;
      border-top: 1px solid #e0e0e0;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .status { font-size: 13px; color: #666; flex: 1; }

    canvas { display: none; }
  </style>
</head>
<body>

<header>
  <h1>图片合并工具</h1>
  <div class="toolbar-group">
    <button onclick="document.getElementById('file-input').click()">添加图片</button>
    <input id="file-input" type="file" accept="image/*" multiple style="display:none">
  </div>
  <div class="toolbar-group">
    <label>对齐：</label>
    <select id="align">
      <option value="left">左对齐</option>
      <option value="center">居中</option>
      <option value="right">右对齐</option>
    </select>
  </div>
  <div class="toolbar-group">
    <label>列数：</label>
    <select id="cols">
      <option value="1">1 列</option>
      <option value="2">2 列</option>
      <option value="3">3 列</option>
      <option value="4">4 列</option>
    </select>
  </div>
  <div class="toolbar-group">
    <label>间距：</label>
    <select id="gap">
      <option value="0">无</option>
      <option value="8">8px</option>
      <option value="16">16px</option>
      <option value="32">32px</option>
    </select>
  </div>
  <div class="toolbar-group" style="margin-left:auto">
    <button class="danger sm" onclick="clearAll()">清空</button>
  </div>
</header>

<div id="drop-zone">
  拖放图片到此处，或点击"添加图片"
</div>

<div id="image-list"></div>

<canvas id="canvas"></canvas>

<footer>
  <span class="status" id="status">请添加图片</span>
  <button class="primary" onclick="mergeAndDownload()">合并并下载</button>
</footer>

<script>
  const items = []; // { file, url, width, height }
  let dragSrcIndex = null;

  // 文件输入
  document.getElementById('file-input').addEventListener('change', e => {
    addFiles(Array.from(e.target.files));
    e.target.value = '';
  });

  // 拖放区
  const dropZone = document.getElementById('drop-zone');
  dropZone.addEventListener('click', () => document.getElementById('file-input').click());
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    addFiles(Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/')));
  });

  // 整个页面也支持拖放
  document.addEventListener('dragover', e => e.preventDefault());
  document.addEventListener('drop', e => {
    e.preventDefault();
    const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
    if (files.length) addFiles(files);
  });

  function addFiles(files) {
    let loaded = 0;
    files.forEach(file => {
      const url = URL.createObjectURL(file);
      const img = new Image();
      img.onload = () => {
        items.push({ file, url, width: img.naturalWidth, height: img.naturalHeight });
        loaded++;
        if (loaded === files.length) render();
      };
      img.src = url;
    });
  }

  function clearAll() {
    items.forEach(it => URL.revokeObjectURL(it.url));
    items.length = 0;
    render();
  }

  function render() {
    const list = document.getElementById('image-list');
    const dz = document.getElementById('drop-zone');
    list.innerHTML = '';

    if (items.length === 0) {
      dz.classList.remove('hidden');
      document.getElementById('status').textContent = '请添加图片';
      return;
    }

    dz.classList.add('hidden');

    items.forEach((item, i) => {
      const div = document.createElement('div');
      div.className = 'image-item';
      div.draggable = true;
      div.dataset.index = i;

      div.innerHTML = `
        <img src="${item.url}" alt="">
        <div class="image-info">
          <div class="image-name">${item.file.name}</div>
          <div class="image-meta">${item.width} × ${item.height} · ${formatSize(item.file.size)}</div>
        </div>
        <div class="image-actions">
          <button class="sm" title="上移" onclick="move(${i}, -1)">↑</button>
          <button class="sm" title="下移" onclick="move(${i}, 1)">↓</button>
          <button class="sm danger" onclick="remove(${i})">删除</button>
        </div>
      `;

      // 拖拽排序
      div.addEventListener('dragstart', () => {
        dragSrcIndex = i;
        setTimeout(() => div.classList.add('dragging'), 0);
      });
      div.addEventListener('dragend', () => div.classList.remove('dragging'));
      div.addEventListener('dragover', e => { e.preventDefault(); div.classList.add('drag-target'); });
      div.addEventListener('dragleave', () => div.classList.remove('drag-target'));
      div.addEventListener('drop', e => {
        e.preventDefault();
        div.classList.remove('drag-target');
        if (dragSrcIndex !== null && dragSrcIndex !== i) {
          const [moved] = items.splice(dragSrcIndex, 1);
          items.splice(i, 0, moved);
          render();
        }
      });

      list.appendChild(div);
    });

    updateStatus();
  }

  function move(index, dir) {
    const newIndex = index + dir;
    if (newIndex < 0 || newIndex >= items.length) return;
    [items[index], items[newIndex]] = [items[newIndex], items[index]];
    render();
  }

  function remove(index) {
    URL.revokeObjectURL(items[index].url);
    items.splice(index, 1);
    render();
  }

  function updateStatus() {
    if (items.length === 0) {
      document.getElementById('status').textContent = '请添加图片';
      return;
    }
    const cols = parseInt(document.getElementById('cols').value);
    const rows = Math.ceil(items.length / cols);
    const suffix = cols > 1 ? `，${cols} 列 × ${rows} 行` : '';
    document.getElementById('status').textContent = `已添加 ${items.length} 张图片${suffix}`;
  }

  // 列数变化时更新状态
  document.getElementById('cols').addEventListener('change', updateStatus);

  function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / 1024 / 1024).toFixed(1) + ' MB';
  }

  async function mergeAndDownload() {
    if (items.length === 0) { alert('请先添加图片'); return; }

    const align = document.getElementById('align').value;
    const gap = parseInt(document.getElementById('gap').value);
    const cols = parseInt(document.getElementById('cols').value);

    // 列宽 = 所有图片中最大的宽度，每张图片等比缩放至列宽
    const colWidth = Math.max(...items.map(it => it.width));

    // 等比缩放后的尺寸
    const scaled = items.map(it => {
      const scale = colWidth / it.width;
      return { ...it, sw: colWidth, sh: Math.round(it.height * scale) };
    });

    // 按列数分行
    const rows = [];
    for (let i = 0; i < scaled.length; i += cols) {
      rows.push(scaled.slice(i, i + cols));
    }

    // 每行高度 = 该行中缩放后最高的图片
    const rowHeights = rows.map(row => Math.max(...row.map(it => it.sh)));

    const totalWidth = colWidth * cols + gap * (cols - 1);
    const totalHeight = rowHeights.reduce((s, h) => s + h, 0) + gap * (rows.length - 1);

    const canvas = document.getElementById('canvas');
    canvas.width = totalWidth;
    canvas.height = totalHeight;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, totalWidth, totalHeight);

    let y = 0;
    for (let r = 0; r < rows.length; r++) {
      const row = rows[r];
      const rowH = rowHeights[r];
      for (let c = 0; c < row.length; c++) {
        const item = row[c];
        const img = await loadImage(item.url);
        let x = c * (colWidth + gap);
        // 单元格内水平对齐（仅当图片未缩放至列宽时生效）
        if (align === 'center') x += Math.round((colWidth - item.sw) / 2);
        else if (align === 'right') x += colWidth - item.sw;
        ctx.drawImage(img, x, y, item.sw, item.sh);
      }
      y += rowH + gap;
    }

    canvas.toBlob(blob => {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'merged.png';
      a.click();
    }, 'image/png');
  }

  function loadImage(src) {
    return new Promise(resolve => {
      const img = new Image();
      img.onload = () => resolve(img);
      img.src = src;
    });
  }
</script>
</body>
</html>
