<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>视频压缩 - 工具箱</title>
  <style>
    :root {
      --bg: #f7f8fa; --surface: #fff; --border: #e8eaed;
      --text: #1f2329; --text-secondary: #646a73; --text-muted: #8f959e;
      --primary: #2563eb; --primary-light: #eff6ff;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 12px rgba(0,0,0,.04);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Segoe UI", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

    nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; height: 52px; display: flex; align-items: center; gap: 16px; }
    .back { text-decoration: none; color: var(--text-secondary); font-size: 13px; display: flex; align-items: center; gap: 4px; padding: 4px 8px; border-radius: 6px; }
    .back:hover { background: var(--bg); color: var(--text); }
    nav h1 { font-size: 15px; font-weight: 600; }

    .container { max-width: 780px; margin: 0 auto; padding: 24px; width: 100%; flex: 1; display: flex; flex-direction: column; gap: 16px; }

    .drop-zone { border: 2px dashed #c8cdd4; border-radius: var(--radius); padding: 48px 40px; text-align: center; color: var(--text-muted); font-size: 14px; cursor: pointer; transition: all .2s; background: var(--surface); }
    .drop-zone:hover, .drop-zone.drag-over { border-color: var(--primary); background: var(--primary-light); color: var(--primary); }
    .drop-zone.hidden { display: none; }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }

    .video-wrap { background: #000; display: flex; justify-content: center; }
    video { max-width: 100%; max-height: 320px; display: block; }

    .file-info { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-bottom: 1px solid var(--border); }
    .file-icon { width: 40px; height: 40px; background: var(--primary-light); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    .file-meta { flex: 1; min-width: 0; }
    .file-name { font-size: 14px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-detail { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
    button.sm-link { background: none; border: none; color: var(--text-muted); font-size: 12px; cursor: pointer; padding: 4px; text-decoration: underline; }
    button.sm-link:hover { color: var(--text); }

    .settings { padding: 16px; display: flex; flex-direction: column; gap: 14px; border-bottom: 1px solid var(--border); }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field > label { font-size: 12px; color: var(--text-muted); font-weight: 500; }

    .btn-group { display: flex; gap: 6px; }
    .opt-btn { flex: 1; padding: 7px 10px; border-radius: 8px; border: 1.5px solid var(--border); background: var(--bg); font-size: 13px; font-weight: 500; cursor: pointer; text-align: center; transition: all .15s; }
    .opt-btn.active { background: var(--primary-light); color: var(--primary); border-color: var(--primary); }
    .opt-btn:hover:not(.active) { border-color: #b0b8c8; }

    .slider-row { display: flex; align-items: center; gap: 10px; }
    .slider-row input[type=range] { flex: 1; accent-color: var(--primary); }
    .slider-val { font-size: 13px; color: var(--text-secondary); min-width: 60px; text-align: right; font-variant-numeric: tabular-nums; }

    .note { font-size: 12px; color: var(--text-muted); padding: 10px 12px; background: var(--bg); border-radius: 8px; border: 1px solid var(--border); line-height: 1.6; }

    .progress-area { padding: 16px; border-top: 1px solid var(--border); display: none; flex-direction: column; gap: 8px; }
    .progress-bar-outer { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .progress-bar-inner { height: 100%; background: var(--primary); border-radius: 3px; transition: width .3s; }
    .progress-label { font-size: 13px; color: var(--text-secondary); }

    .result-area { padding: 16px; border-top: 1px solid var(--border); display: none; flex-direction: column; gap: 10px; }
    .result-row { display: flex; align-items: center; gap: 12px; }
    .result-icon { font-size: 28px; }
    .result-info { flex: 1; }
    .result-name { font-size: 14px; font-weight: 500; }
    .result-detail { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
    .result-video { max-width: 100%; border-radius: 8px; }

    .actions { padding: 14px 16px; border-top: 1px solid var(--border); display: flex; gap: 10px; }
    button { padding: 8px 18px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); font-size: 13px; cursor: pointer; transition: all .15s; font-weight: 500; }
    button:hover:not(:disabled) { background: var(--bg); }
    button:disabled { opacity: .4; cursor: not-allowed; }
    button.primary { background: var(--primary); color: #fff; border-color: var(--primary); flex: 1; }
    button.primary:hover:not(:disabled) { background: #1d4ed8; }
    button.download { background: #16a34a; color: #fff; border-color: #16a34a; }
    button.download:hover:not(:disabled) { background: #15803d; }

    canvas { display: none; }
  </style>
</head>
<body>
<nav>
  <a href="index.html" class="back">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    返回
  </a>
  <h1>🗜️ 视频压缩</h1>
</nav>

<div class="container">
  <div class="drop-zone" id="drop-zone">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin-bottom:12px;opacity:.4"><rect x="3" y="3" width="18" height="18" rx="2"/><polygon points="5,17 10,12 13,15 17,10 22,17"/></svg>
    <div>拖放视频到此处，或<b>点击选择</b></div>
    <div style="font-size:12px;margin-top:6px;color:#aaa">支持 MP4、WebM、MOV 等格式</div>
  </div>
  <input type="file" id="file-input" accept="video/*" style="display:none">

  <div class="card" id="main-card" style="display:none">
    <div class="video-wrap">
      <video id="video" controls></video>
    </div>

    <div class="file-info">
      <div class="file-icon">🎬</div>
      <div class="file-meta">
        <div class="file-name" id="file-name"></div>
        <div class="file-detail" id="file-detail"></div>
      </div>
      <button class="sm-link" onclick="document.getElementById('file-input').click()">换一个</button>
    </div>

    <div class="settings">
      <div class="field">
        <label>压缩质量</label>
        <div class="btn-group">
          <div class="opt-btn" data-q="high">高质量</div>
          <div class="opt-btn active" data-q="medium">中等</div>
          <div class="opt-btn" data-q="low">较小体积</div>
        </div>
      </div>

      <div class="field">
        <label>分辨率缩放</label>
        <div class="btn-group">
          <div class="opt-btn active" data-scale="1">原始</div>
          <div class="opt-btn" data-scale="0.75">75%</div>
          <div class="opt-btn" data-scale="0.5">50%</div>
        </div>
      </div>

      <div class="field">
        <label>视频码率</label>
        <div class="slider-row">
          <input type="range" id="bitrate-slider" min="200" max="8000" step="100" value="2000">
          <span class="slider-val" id="bitrate-val">2000 kbps</span>
        </div>
      </div>

      <div class="note">
        使用浏览器 MediaRecorder API 重新编码视频为 WebM 格式。压缩效果取决于浏览器支持的编码器。输出格式固定为 WebM (VP8/VP9)。
      </div>
    </div>

    <div class="progress-area" id="progress-area">
      <div class="progress-label" id="progress-label">压缩中…</div>
      <div class="progress-bar-outer">
        <div class="progress-bar-inner" id="progress-bar" style="width:0%"></div>
      </div>
    </div>

    <div class="result-area" id="result-area">
      <div class="result-row">
        <div class="result-icon">🎬</div>
        <div class="result-info">
          <div class="result-name" id="result-name"></div>
          <div class="result-detail" id="result-detail"></div>
        </div>
      </div>
      <video id="result-video" class="result-video" controls></video>
    </div>

    <div class="actions">
      <button class="primary" id="btn-compress" onclick="doCompress()">开始压缩</button>
      <button class="download" id="btn-download" onclick="downloadResult()" disabled style="display:none">⬇ 下载</button>
    </div>
  </div>
</div>

<canvas id="canvas"></canvas>

<script>
  const video = document.getElementById('video');
  let currentFile = null;
  let resultBlob = null;
  let resultUrl = null;
  let quality = 'medium';
  let scale = 1;
  let bitrate = 2000;

  const bitrateMap = { high: 4000, medium: 2000, low: 800 };

  const dz = document.getElementById('drop-zone');
  dz.addEventListener('click', () => document.getElementById('file-input').click());
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
  dz.addEventListener('drop', e => {
    e.preventDefault(); dz.classList.remove('drag-over');
    const f = [...e.dataTransfer.files].find(f => f.type.startsWith('video/'));
    if (f) loadFile(f);
  });
  document.addEventListener('dragover', e => e.preventDefault());
  document.addEventListener('drop', e => {
    e.preventDefault();
    const f = [...e.dataTransfer.files].find(f => f.type.startsWith('video/'));
    if (f) loadFile(f);
  });
  document.getElementById('file-input').addEventListener('change', e => {
    if (e.target.files[0]) loadFile(e.target.files[0]);
    e.target.value = '';
  });

  function loadFile(file) {
    currentFile = file;
    video.src = URL.createObjectURL(file);
    video.onloadedmetadata = () => {
      document.getElementById('file-name').textContent = file.name;
      document.getElementById('file-detail').textContent =
        `${fmtSize(file.size)} · ${video.videoWidth}×${video.videoHeight} · ${fmtTime(video.duration)}`;
    };
    dz.classList.add('hidden');
    document.getElementById('main-card').style.display = '';
    resetResult();
  }

  // options
  document.querySelectorAll('[data-q]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-q]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      quality = btn.dataset.q;
      bitrate = bitrateMap[quality];
      document.getElementById('bitrate-slider').value = bitrate;
      document.getElementById('bitrate-val').textContent = bitrate + ' kbps';
    });
  });
  document.querySelectorAll('[data-scale]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-scale]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      scale = parseFloat(btn.dataset.scale);
    });
  });
  document.getElementById('bitrate-slider').addEventListener('input', function() {
    bitrate = parseInt(this.value);
    document.getElementById('bitrate-val').textContent = bitrate + ' kbps';
    // deselect quality presets
    document.querySelectorAll('[data-q]').forEach(b => b.classList.remove('active'));
  });

  // ── compress ──
  async function doCompress() {
    if (!currentFile) return;

    document.getElementById('btn-compress').disabled = true;
    document.getElementById('btn-download').style.display = 'none';
    document.getElementById('result-area').style.display = 'none';
    setProgress(true, 0, '准备压缩…');

    const canvas = document.getElementById('canvas');
    const w = Math.round(video.videoWidth * scale);
    const h = Math.round(video.videoHeight * scale);
    canvas.width = w;
    canvas.height = h;
    const ctx = canvas.getContext('2d');

    // create stream from canvas
    const stream = canvas.captureStream(30);

    // add audio track if exists
    try {
      const audioCtx = new AudioContext();
      const source = audioCtx.createMediaElementSource(video);
      const dest = audioCtx.createMediaStreamDestination();
      source.connect(dest);
      source.connect(audioCtx.destination);
      dest.stream.getAudioTracks().forEach(t => stream.addTrack(t));
    } catch(e) { /* no audio or already captured */ }

    const mimeType = MediaRecorder.isTypeSupported('video/webm;codecs=vp9')
      ? 'video/webm;codecs=vp9' : 'video/webm;codecs=vp8';

    const recorder = new MediaRecorder(stream, {
      mimeType,
      videoBitsPerSecond: bitrate * 1000
    });

    const chunks = [];
    recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };

    const done = new Promise(resolve => {
      recorder.onstop = () => resolve();
    });

    video.currentTime = 0;
    await new Promise(r => { video.onseeked = r; });
    video.play();
    recorder.start(100);

    // draw frames
    const duration = video.duration;
    const drawLoop = () => {
      if (video.ended || video.paused) {
        recorder.stop();
        return;
      }
      ctx.drawImage(video, 0, 0, w, h);
      const pct = Math.min(95, (video.currentTime / duration) * 95);
      setProgress(true, pct, `压缩中… ${Math.round(pct)}%`);
      requestAnimationFrame(drawLoop);
    };
    drawLoop();

    video.onended = () => {
      if (recorder.state !== 'inactive') recorder.stop();
    };

    await done;
    video.pause();
    video.currentTime = 0;

    setProgress(true, 100, '完成');

    resultBlob = new Blob(chunks, { type: mimeType });
    if (resultUrl) URL.revokeObjectURL(resultUrl);
    resultUrl = URL.createObjectURL(resultBlob);

    const ratio = ((1 - resultBlob.size / currentFile.size) * 100).toFixed(0);
    document.getElementById('result-video').src = resultUrl;
    document.getElementById('result-name').textContent =
      currentFile.name.replace(/\.[^.]+$/, '') + '_compressed.webm';
    document.getElementById('result-detail').textContent =
      `${fmtSize(resultBlob.size)} · ${w}×${h} · 压缩率 ${ratio}%`;

    document.getElementById('result-area').style.display = 'flex';
    document.getElementById('btn-download').style.display = '';
    document.getElementById('btn-download').disabled = false;
    setProgress(false);
    document.getElementById('btn-compress').disabled = false;
  }

  function downloadResult() {
    if (!resultBlob) return;
    const a = document.createElement('a');
    a.href = resultUrl;
    a.download = currentFile.name.replace(/\.[^.]+$/, '') + '_compressed.webm';
    a.click();
  }

  function resetResult() {
    resultBlob = null;
    document.getElementById('result-area').style.display = 'none';
    document.getElementById('btn-download').style.display = 'none';
    setProgress(false);
  }

  function setProgress(show, pct, label) {
    document.getElementById('progress-area').style.display = show ? 'flex' : 'none';
    if (show) {
      document.getElementById('progress-bar').style.width = pct + '%';
      document.getElementById('progress-label').textContent = label;
    }
  }
  function fmtTime(s) {
    if (!isFinite(s)) return '--:--';
    const m = Math.floor(s / 60), sec = Math.floor(s % 60);
    return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  }
  function fmtSize(b) {
    if (b < 1024) return b + ' B';
    if (b < 1024 * 1024) return (b / 1024).toFixed(1) + ' KB';
    return (b / 1024 / 1024).toFixed(1) + ' MB';
  }
</script>
</body>
</html>
