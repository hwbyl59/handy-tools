<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>哈希计算 - 工具箱</title>
  <style>
    :root {
      --bg: #f7f8fa; --surface: #fff; --border: #e8eaed;
      --text: #1f2329; --text-secondary: #646a73; --text-muted: #8f959e;
      --primary: #2563eb; --primary-light: #eff6ff;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 12px rgba(0,0,0,.04);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Segoe UI", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

    nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; height: 52px; display: flex; align-items: center; gap: 16px; }
    .back { text-decoration: none; color: var(--text-secondary); font-size: 13px; display: flex; align-items: center; gap: 4px; padding: 4px 8px; border-radius: 6px; }
    .back:hover { background: var(--bg); color: var(--text); }
    nav h1 { font-size: 15px; font-weight: 600; }

    .container { max-width: 780px; margin: 0 auto; padding: 24px; width: 100%; flex: 1; display: flex; flex-direction: column; gap: 16px; }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }

    .tabs { display: flex; gap: 4px; padding: 16px 16px 0; }
    .tab { padding: 7px 16px; border-radius: 8px; border: 1.5px solid var(--border); background: var(--bg); font-size: 13px; font-weight: 500; cursor: pointer; transition: all .15s; }
    .tab.active { background: var(--primary-light); color: var(--primary); border-color: var(--primary); }
    .tab:hover:not(.active) { border-color: #b0b8c8; }

    .section { display: none; padding: 16px; flex-direction: column; gap: 12px; }
    .section.active { display: flex; }

    label.field-label { font-size: 12px; color: var(--text-muted); font-weight: 500; }

    textarea { resize: vertical; min-height: 120px; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-family: "SF Mono", Consolas, monospace; font-size: 13px; line-height: 1.5; background: var(--bg); color: var(--text); outline: none; }
    textarea:focus { border-color: var(--primary); }

    button { padding: 7px 16px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); font-size: 13px; cursor: pointer; transition: all .15s; font-weight: 500; }
    button:hover { background: var(--bg); }
    button.primary { background: var(--primary); color: #fff; border-color: var(--primary); }
    button.primary:hover { background: #1d4ed8; }

    .drop-zone { border: 2px dashed #c8cdd4; border-radius: 8px; padding: 24px; text-align: center; color: var(--text-muted); font-size: 13px; cursor: pointer; transition: all .2s; }
    .drop-zone:hover, .drop-zone.drag-over { border-color: var(--primary); background: var(--primary-light); color: var(--primary); }

    .results { display: flex; flex-direction: column; gap: 8px; }
    .hash-row { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: var(--bg); border-radius: 8px; border: 1px solid var(--border); }
    .hash-label { font-size: 12px; font-weight: 600; color: var(--text-secondary); min-width: 70px; flex-shrink: 0; }
    .hash-value { flex: 1; font-family: "SF Mono", Consolas, monospace; font-size: 12px; word-break: break-all; line-height: 1.5; min-width: 0; }
    .hash-copy { background: none; border: none; color: var(--primary); font-size: 11px; cursor: pointer; padding: 2px 6px; border-radius: 4px; flex-shrink: 0; }
    .hash-copy:hover { background: var(--primary-light); }
    .hash-row.computing .hash-value { color: var(--text-muted); }

    .info { font-size: 12px; color: var(--text-muted); }
  </style>
</head>
<body>
<nav>
  <a href="index.html" class="back">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    返回
  </a>
  <h1>🔑 哈希计算</h1>
</nav>

<div class="container">
  <div class="card">
    <div class="tabs">
      <div class="tab active" data-tab="text">文本哈希</div>
      <div class="tab" data-tab="file">文件哈希</div>
    </div>

    <!-- 文本 -->
    <div class="section active" id="sec-text">
      <label class="field-label">输入文本</label>
      <textarea id="text-input" placeholder="输入或粘贴要计算哈希的文本…"></textarea>
      <button class="primary" onclick="hashText()">计算哈希</button>
      <div class="results" id="text-results"></div>
    </div>

    <!-- 文件 -->
    <div class="section" id="sec-file">
      <div class="drop-zone" id="file-drop">
        拖放文件到此处，或<b>点击选择</b>
      </div>
      <input type="file" id="file-input" style="display:none">
      <span class="info" id="file-info"></span>
      <div class="results" id="file-results"></div>
    </div>
  </div>
</div>

<script>
  const ALGOS = [
    { name: 'MD5', id: 'md5' },
    { name: 'SHA-1', id: 'SHA-1' },
    { name: 'SHA-256', id: 'SHA-256' },
    { name: 'SHA-512', id: 'SHA-512' },
  ];

  // tabs
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('sec-' + tab.dataset.tab).classList.add('active');
    });
  });

  // text hash
  async function hashText() {
    const text = document.getElementById('text-input').value;
    const buf = new TextEncoder().encode(text);
    const container = document.getElementById('text-results');
    renderLoading(container);
    await computeAll(buf, container);
  }

  // file hash
  const fileDrop = document.getElementById('file-drop');
  const fileInput = document.getElementById('file-input');

  fileDrop.addEventListener('click', () => fileInput.click());
  fileDrop.addEventListener('dragover', e => { e.preventDefault(); fileDrop.classList.add('drag-over'); });
  fileDrop.addEventListener('dragleave', () => fileDrop.classList.remove('drag-over'));
  fileDrop.addEventListener('drop', e => {
    e.preventDefault(); fileDrop.classList.remove('drag-over');
    if (e.dataTransfer.files[0]) hashFile(e.dataTransfer.files[0]);
  });
  fileInput.addEventListener('change', e => {
    if (e.target.files[0]) hashFile(e.target.files[0]);
    e.target.value = '';
  });

  async function hashFile(file) {
    document.getElementById('file-info').textContent = `${file.name} · ${fmtSize(file.size)}`;
    const container = document.getElementById('file-results');
    renderLoading(container);
    const buf = new Uint8Array(await file.arrayBuffer());
    await computeAll(buf, container);
  }

  function renderLoading(container) {
    container.innerHTML = ALGOS.map(a =>
      `<div class="hash-row computing"><span class="hash-label">${a.name}</span><span class="hash-value">计算中…</span></div>`
    ).join('');
  }

  async function computeAll(buf, container) {
    for (let i = 0; i < ALGOS.length; i++) {
      const algo = ALGOS[i];
      let hex;
      if (algo.id === 'md5') {
        hex = md5(buf);
      } else {
        const hashBuf = await crypto.subtle.digest(algo.id, buf);
        hex = Array.from(new Uint8Array(hashBuf)).map(b => b.toString(16).padStart(2, '0')).join('');
      }
      const row = container.children[i];
      row.classList.remove('computing');
      row.innerHTML = `<span class="hash-label">${algo.name}</span><span class="hash-value">${hex}</span><button class="hash-copy" onclick="copyHash(this)">复制</button>`;
    }
  }

  function copyHash(btn) {
    const val = btn.previousElementSibling.textContent;
    navigator.clipboard.writeText(val).then(() => {
      btn.textContent = '已复制';
      setTimeout(() => { btn.textContent = '复制'; }, 1500);
    });
  }

  // ── MD5 implementation ──
  function md5(input) {
    const bytes = input instanceof Uint8Array ? input : new TextEncoder().encode(input);
    const len = bytes.length;

    // pre-processing
    const bitLen = len * 8;
    const padLen = ((56 - (len + 1) % 64) + 64) % 64;
    const buf = new Uint8Array(len + 1 + padLen + 8);
    buf.set(bytes);
    buf[len] = 0x80;
    const view = new DataView(buf.buffer);
    view.setUint32(buf.length - 8, bitLen & 0xffffffff, true);
    view.setUint32(buf.length - 4, Math.floor(bitLen / 0x100000000), true);

    // initial hash
    let a0 = 0x67452301, b0 = 0xefcdab89, c0 = 0x98badcfe, d0 = 0x10325476;

    const s = [
      7,12,17,22,7,12,17,22,7,12,17,22,7,12,17,22,
      5,9,14,20,5,9,14,20,5,9,14,20,5,9,14,20,
      4,11,16,23,4,11,16,23,4,11,16,23,4,11,16,23,
      6,10,15,21,6,10,15,21,6,10,15,21,6,10,15,21
    ];
    const K = new Uint32Array(64);
    for (let i = 0; i < 64; i++) K[i] = Math.floor(Math.abs(Math.sin(i + 1)) * 0x100000000);

    for (let offset = 0; offset < buf.length; offset += 64) {
      const M = new Uint32Array(16);
      for (let j = 0; j < 16; j++) M[j] = view.getUint32(offset + j * 4, true);

      let A = a0, B = b0, C = c0, D = d0;

      for (let i = 0; i < 64; i++) {
        let F, g;
        if (i < 16) { F = (B & C) | (~B & D); g = i; }
        else if (i < 32) { F = (D & B) | (~D & C); g = (5 * i + 1) % 16; }
        else if (i < 48) { F = B ^ C ^ D; g = (3 * i + 5) % 16; }
        else { F = C ^ (B | ~D); g = (7 * i) % 16; }

        F = (F + A + K[i] + M[g]) >>> 0;
        A = D; D = C; C = B;
        B = (B + ((F << s[i]) | (F >>> (32 - s[i])))) >>> 0;
      }

      a0 = (a0 + A) >>> 0;
      b0 = (b0 + B) >>> 0;
      c0 = (c0 + C) >>> 0;
      d0 = (d0 + D) >>> 0;
    }

    const toHex = n => {
      const b = new DataView(new ArrayBuffer(4));
      b.setUint32(0, n, true);
      return Array.from(new Uint8Array(b.buffer)).map(x => x.toString(16).padStart(2, '0')).join('');
    };
    return toHex(a0) + toHex(b0) + toHex(c0) + toHex(d0);
  }

  function fmtSize(b) {
    if (b < 1024) return b + ' B';
    if (b < 1024 * 1024) return (b / 1024).toFixed(1) + ' KB';
    return (b / 1024 / 1024).toFixed(1) + ' MB';
  }
</script>
</body>
</html>
