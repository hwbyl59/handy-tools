<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>格式转换 - 工具箱</title>
  <style>
    :root {
      --bg: #f7f8fa; --surface: #fff; --border: #e8eaed;
      --text: #1f2329; --text-secondary: #646a73; --text-muted: #8f959e;
      --primary: #2563eb; --primary-light: #eff6ff;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 12px rgba(0,0,0,.04);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Segoe UI", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

    nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; height: 52px; display: flex; align-items: center; gap: 16px; }
    .back { text-decoration: none; color: var(--text-secondary); font-size: 13px; display: flex; align-items: center; gap: 4px; padding: 4px 8px; border-radius: 6px; }
    .back:hover { background: var(--bg); color: var(--text); }
    nav h1 { font-size: 15px; font-weight: 600; }

    .container { max-width: 900px; margin: 0 auto; padding: 24px; width: 100%; flex: 1; }

    .drop-zone { border: 2px dashed #c8cdd4; border-radius: var(--radius); padding: 40px; text-align: center; color: var(--text-muted); font-size: 14px; cursor: pointer; transition: all .2s; background: var(--surface); }
    .drop-zone:hover, .drop-zone.drag-over { border-color: var(--primary); background: var(--primary-light); color: var(--primary); }
    .drop-zone.hidden { display: none; }

    .settings { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 20px; margin: 16px 0; display: flex; align-items: center; gap: 24px; flex-wrap: wrap; box-shadow: var(--shadow); }
    .settings.hidden { display: none; }
    .setting-item { display: flex; align-items: center; gap: 10px; }
    .setting-item label { font-size: 13px; color: var(--text-secondary); white-space: nowrap; }

    /* 格式选择按钮组 */
    .fmt-group { display: flex; gap: 6px; }
    .fmt-btn { padding: 6px 16px; border-radius: 20px; border: 1.5px solid var(--border); background: var(--bg); font-size: 13px; font-weight: 500; cursor: pointer; transition: all .15s; }
    .fmt-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .fmt-btn:hover:not(.active) { border-color: var(--primary); color: var(--primary); }

    select { padding: 5px 8px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); font-size: 13px; }
    .quality-wrap { display: flex; align-items: center; gap: 8px; }
    input[type=range] { width: 120px; accent-color: var(--primary); }
    .quality-val { font-size: 13px; font-weight: 600; color: var(--primary); width: 32px; }
    .quality-row { display: flex; align-items: center; gap: 10px; }
    .quality-row.hidden { display: none; }

    .actions { margin-left: auto; display: flex; gap: 8px; }
    button { padding: 7px 16px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); font-size: 13px; cursor: pointer; transition: all .15s; }
    button:hover { background: var(--bg); }
    button.primary { background: var(--primary); color: #fff; border-color: var(--primary); }
    button.primary:hover { background: #1d4ed8; }
    button.sm { padding: 4px 10px; font-size: 12px; }

    /* 文件表格 */
    .file-table { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }
    .file-table-header { display: grid; grid-template-columns: 56px 1fr 100px 100px 80px 80px; gap: 12px; padding: 10px 16px; border-bottom: 1px solid var(--border); font-size: 12px; color: var(--text-muted); font-weight: 500; }
    .file-row { display: grid; grid-template-columns: 56px 1fr 100px 100px 80px 80px; gap: 12px; padding: 10px 16px; border-bottom: 1px solid var(--border); align-items: center; }
    .file-row:last-child { border-bottom: none; }
    .file-row img { width: 44px; height: 44px; object-fit: contain; border-radius: 6px; background: var(--bg); }
    .file-name { font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-ext { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: 600; background: var(--bg); border: 1px solid var(--border); }
    .file-size { font-size: 13px; color: var(--text-secondary); }
    .status-badge { font-size: 11px; padding: 3px 8px; border-radius: 10px; font-weight: 500; }
    .status-badge.ready { background: #dcfce7; color: #16a34a; }
    .status-badge.pending { background: var(--bg); color: var(--text-muted); }
    .status-badge.converting { background: #fef9c3; color: #a16207; }

    canvas { display: none; }
  </style>
</head>
<body>
<nav>
  <a href="index.html" class="back">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    返回
  </a>
  <h1>🔄 格式转换</h1>
</nav>

<div class="container">
  <div class="drop-zone" id="drop-zone">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin-bottom:12px;opacity:.4"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
    <div>拖放图片到此处，或<b>点击选择</b></div>
    <div style="font-size:12px;margin-top:6px;color:#aaa">支持 PNG、JPEG、WebP，可多选</div>
  </div>
  <input type="file" id="file-input" accept="image/*" multiple style="display:none">

  <div class="settings hidden" id="settings">
    <div class="setting-item">
      <label>转换为</label>
      <div class="fmt-group">
        <button class="fmt-btn active" data-fmt="image/jpeg">JPEG</button>
        <button class="fmt-btn" data-fmt="image/png">PNG</button>
        <button class="fmt-btn" data-fmt="image/webp">WebP</button>
      </div>
    </div>
    <div class="quality-row setting-item" id="quality-row">
      <label>质量</label>
      <div class="quality-wrap">
        <input type="range" id="quality" min="10" max="100" value="90">
        <span class="quality-val" id="quality-val">90</span>
      </div>
    </div>
    <div class="actions">
      <button onclick="clearAll()">清空</button>
      <button class="primary" onclick="convertAll()">全部转换并下载</button>
    </div>
  </div>

  <div id="file-table-wrap"></div>
</div>
<canvas id="canvas"></canvas>

<script>
  const items = [];
  let currentFmt = 'image/jpeg';

  document.getElementById('drop-zone').addEventListener('click', () => document.getElementById('file-input').click());
  document.getElementById('file-input').addEventListener('change', e => { addFiles(Array.from(e.target.files)); e.target.value = ''; });

  const dz = document.getElementById('drop-zone');
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
  dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('drag-over'); addFiles(Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'))); });
  document.addEventListener('dragover', e => e.preventDefault());
  document.addEventListener('drop', e => { e.preventDefault(); addFiles(Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'))); });

  // 格式按钮
  document.querySelectorAll('.fmt-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.fmt-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFmt = btn.dataset.fmt;
      const qr = document.getElementById('quality-row');
      qr.classList.toggle('hidden', currentFmt === 'image/png');
      items.forEach((it, i) => it && setStatus(i, 'pending'));
    });
  });

  document.getElementById('quality').addEventListener('input', function () {
    document.getElementById('quality-val').textContent = this.value;
    items.forEach((it, i) => it && setStatus(i, 'pending'));
  });

  function addFiles(files) {
    const startIdx = items.length;
    files.forEach((file, fi) => {
      const url = URL.createObjectURL(file);
      items.push({ file, url });
    });
    dz.classList.add('hidden');
    document.getElementById('settings').classList.remove('hidden');
    renderTable();
  }

  function clearAll() {
    items.forEach(it => it && URL.revokeObjectURL(it.url));
    items.length = 0;
    document.getElementById('file-table-wrap').innerHTML = '';
    dz.classList.remove('hidden');
    document.getElementById('settings').classList.add('hidden');
  }

  function fmtExt(mime) {
    return { 'image/jpeg': 'jpg', 'image/png': 'png', 'image/webp': 'webp' }[mime] || 'jpg';
  }

  function renderTable() {
    const wrap = document.getElementById('file-table-wrap');
    wrap.innerHTML = '';
    if (items.length === 0) return;

    const table = document.createElement('div');
    table.className = 'file-table';
    table.innerHTML = `<div class="file-table-header"><div></div><div>文件名</div><div>原格式</div><div>原大小</div><div>状态</div><div>操作</div></div>`;

    items.forEach((item, i) => {
      if (!item) return;
      const origExt = item.file.name.split('.').pop().toUpperCase();
      const row = document.createElement('div');
      row.className = 'file-row';
      row.id = `row-${i}`;
      row.innerHTML = `
        <img src="${item.url}" alt="">
        <div class="file-name" title="${item.file.name}">${item.file.name}</div>
        <div><span class="file-ext">${origExt}</span> → <span class="file-ext" style="background:var(--primary-light);color:var(--primary);border-color:var(--primary)">${fmtExt(currentFmt).toUpperCase()}</span></div>
        <div class="file-size">${fmtSize(item.file.size)}</div>
        <div><span class="status-badge pending" id="status-${i}">待转换</span></div>
        <div><button class="sm primary" onclick="convertOne(${i})">转换下载</button></div>
      `;
      table.appendChild(row);
    });

    wrap.appendChild(table);
  }

  function setStatus(idx, state) {
    const el = document.getElementById(`status-${idx}`);
    if (!el) return;
    const map = { pending: ['pending', '待转换'], converting: ['converting', '转换中…'], ready: ['ready', '已完成'] };
    el.className = 'status-badge ' + map[state][0];
    el.textContent = map[state][1];
  }

  async function convertOne(idx) {
    const item = items[idx];
    if (!item) return;
    setStatus(idx, 'converting');
    const quality = parseInt(document.getElementById('quality').value) / 100;
    const blob = await toBlob(item.url, currentFmt, quality);
    const ext = fmtExt(currentFmt);
    const name = item.file.name.replace(/\.[^.]+$/, '') + '.' + ext;
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = name;
    a.click();
    setStatus(idx, 'ready');
  }

  async function convertAll() {
    for (let i = 0; i < items.length; i++) {
      if (items[i]) await convertOne(i);
    }
  }

  function toBlob(url, fmt, quality) {
    return new Promise(resolve => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.getElementById('canvas');
        canvas.width = img.naturalWidth;
        canvas.height = img.naturalHeight;
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (fmt !== 'image/png') { ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, canvas.width, canvas.height); }
        ctx.drawImage(img, 0, 0);
        canvas.toBlob(resolve, fmt, quality);
      };
      img.src = url;
    });
  }

  function fmtSize(b) {
    if (b < 1024) return b + ' B';
    if (b < 1024 * 1024) return (b / 1024).toFixed(1) + ' KB';
    return (b / 1024 / 1024).toFixed(1) + ' MB';
  }
</script>
</body>
</html>
