<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>音频播放器 - 工具箱</title>
  <style>
    :root {
      --bg: #f7f8fa; --surface: #fff; --border: #e8eaed;
      --text: #1f2329; --text-secondary: #646a73; --text-muted: #8f959e;
      --primary: #2563eb; --primary-light: #eff6ff;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 12px rgba(0,0,0,.04);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Segoe UI", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

    nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; height: 52px; display: flex; align-items: center; gap: 16px; }
    .back { text-decoration: none; color: var(--text-secondary); font-size: 13px; display: flex; align-items: center; gap: 4px; padding: 4px 8px; border-radius: 6px; }
    .back:hover { background: var(--bg); color: var(--text); }
    nav h1 { font-size: 15px; font-weight: 600; }

    .container { max-width: 720px; margin: 0 auto; padding: 24px; width: 100%; flex: 1; display: flex; flex-direction: column; gap: 16px; }

    .drop-zone { border: 2px dashed #c8cdd4; border-radius: var(--radius); padding: 48px 40px; text-align: center; color: var(--text-muted); font-size: 14px; cursor: pointer; transition: all .2s; background: var(--surface); }
    .drop-zone:hover, .drop-zone.drag-over { border-color: var(--primary); background: var(--primary-light); color: var(--primary); }
    .drop-zone.hidden { display: none; }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }

    /* 文件信息 */
    .file-info { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-bottom: 1px solid var(--border); }
    .file-icon { width: 44px; height: 44px; background: var(--primary-light); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
    .file-meta { flex: 1; min-width: 0; }
    .file-name { font-size: 14px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-detail { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
    button.sm-link { background: none; border: none; color: var(--text-muted); font-size: 12px; cursor: pointer; padding: 4px; text-decoration: underline; }
    button.sm-link:hover { color: var(--text); }

    /* 进度条 */
    .progress-section { padding: 16px 16px 0; }
    .progress-track { position: relative; height: 6px; background: var(--border); border-radius: 3px; cursor: pointer; }
    .progress-fill { height: 100%; background: var(--primary); border-radius: 3px; transition: width .1s linear; pointer-events: none; }
    .progress-thumb { position: absolute; top: 50%; width: 14px; height: 14px; background: var(--primary); border: 2px solid #fff; border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 1px 4px rgba(0,0,0,.15); pointer-events: none; transition: left .1s linear; }
    .progress-track:hover .progress-thumb { transform: translate(-50%, -50%) scale(1.2); }
    .time-row { display: flex; justify-content: space-between; margin-top: 6px; font-size: 11px; color: var(--text-muted); font-variant-numeric: tabular-nums; }

    /* 播放控制 */
    .controls { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 16px; }

    .ctrl-btn { width: 36px; height: 36px; border-radius: 50%; border: 1.5px solid var(--border); background: var(--surface); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all .15s; flex-shrink: 0; }
    .ctrl-btn:hover { background: var(--primary-light); border-color: var(--primary); }
    .ctrl-btn svg { width: 16px; height: 16px; fill: var(--text); }

    .play-btn { width: 52px; height: 52px; border-radius: 50%; border: none; background: var(--primary); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all .15s; flex-shrink: 0; box-shadow: 0 2px 8px rgba(37,99,235,.3); }
    .play-btn:hover { background: #1d4ed8; transform: scale(1.05); }
    .play-btn svg { width: 22px; height: 22px; fill: #fff; }

    /* 速度控制 */
    .speed-section { display: flex; align-items: center; gap: 8px; padding: 0 16px 16px; justify-content: center; border-bottom: 1px solid var(--border); }
    .speed-label { font-size: 12px; color: var(--text-muted); font-weight: 500; }
    .speed-btns { display: flex; gap: 4px; }
    .speed-btn { padding: 4px 10px; border-radius: 6px; border: 1.5px solid var(--border); background: var(--bg); font-size: 12px; font-weight: 500; cursor: pointer; transition: all .15s; }
    .speed-btn.active { background: var(--primary-light); color: var(--primary); border-color: var(--primary); }
    .speed-btn:hover:not(.active) { border-color: #b0b8c8; }

    /* 音量 */
    .volume-row { display: flex; align-items: center; gap: 8px; padding: 12px 16px; border-bottom: 1px solid var(--border); }
    .volume-icon { cursor: pointer; color: var(--text-secondary); display: flex; }
    .volume-icon:hover { color: var(--primary); }
    .volume-slider { flex: 1; accent-color: var(--primary); max-width: 140px; }
    .volume-val { font-size: 11px; color: var(--text-muted); min-width: 32px; font-variant-numeric: tabular-nums; }
    .volume-spacer { flex: 1; }

    /* 转录区 */
    .transcribe-section { border-top: 1px solid var(--border); }
    .transcribe-header { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-bottom: 1px solid var(--border); }
    .transcribe-header .title { font-size: 13px; font-weight: 600; }
    .transcribe-header .hint { font-size: 11px; color: var(--text-muted); flex: 1; }

    .transcribe-settings { padding: 12px 16px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; border-bottom: 1px solid var(--border); }
    .transcribe-settings .field-inline { display: flex; align-items: center; gap: 6px; }
    .transcribe-settings .field-inline label { font-size: 12px; color: var(--text-muted); font-weight: 500; white-space: nowrap; }
    .mini-btn-group { display: flex; gap: 3px; }
    .mini-btn { padding: 3px 8px; border-radius: 5px; border: 1px solid var(--border); background: var(--bg); font-size: 11px; font-weight: 500; cursor: pointer; transition: all .15s; }
    .mini-btn.active { background: var(--primary-light); color: var(--primary); border-color: var(--primary); }
    .mini-btn:hover:not(.active) { border-color: #b0b8c8; }

    .transcribe-progress { padding: 10px 16px; display: none; flex-direction: column; gap: 6px; }
    .tp-bar-outer { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .tp-bar-inner { height: 100%; background: var(--primary); border-radius: 2px; transition: width .3s; }
    @keyframes tp-slide { 0% { transform: translateX(-100%); } 100% { transform: translateX(500%); } }
    .tp-bar-inner.indeterminate { width: 18% !important; animation: tp-slide 1.2s ease-in-out infinite; transition: none; }
    .tp-label { font-size: 12px; color: var(--text-secondary); }

    .text-result { display: none; flex-direction: column; gap: 8px; padding: 12px 16px; }
    .text-result.open { display: flex; }
    .text-result-header { display: flex; align-items: center; gap: 6px; }
    .text-result-header .badge { font-size: 11px; color: #16a34a; background: #f0fdf4; border: 1px solid #bbf7d0; padding: 1px 8px; border-radius: 10px; font-weight: 500; }
    .text-result-actions { display: flex; gap: 6px; margin-left: auto; }
    .text-result-actions button { padding: 4px 10px; font-size: 11px; }
    .text-area { width: 100%; min-height: 160px; resize: vertical; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; line-height: 1.8; background: var(--bg); color: var(--text); outline: none; font-family: inherit; }
    .text-area:focus { border-color: var(--primary); }
    .text-area.hidden { display: none; }
    .text-hint { font-size: 11px; color: var(--text-muted); }

    /* 键盘快捷键提示 */
    .shortcuts { padding: 12px 16px; font-size: 11px; color: var(--text-muted); line-height: 1.8; border-top: 1px solid var(--border); }
    .shortcuts kbd { padding: 1px 5px; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; font-family: inherit; font-size: 11px; }
  </style>
</head>
<body>
<nav>
  <a href="index.html" class="back">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    返回
  </a>
  <h1>🎧 音频播放器</h1>
</nav>

<div class="container">
  <div class="drop-zone" id="drop-zone">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin-bottom:12px;opacity:.4"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
    <div>拖放音频文件到此处，或<b>点击选择</b></div>
    <div style="font-size:12px;margin-top:6px;color:#aaa">支持 MP3、WAV、OGG、AAC、M4A、FLAC 等格式</div>
  </div>
  <input type="file" id="file-input" accept="audio/*" style="display:none">

  <div class="card" id="main-card" style="display:none">
    <!-- 文件信息 -->
    <div class="file-info">
      <div class="file-icon">🎵</div>
      <div class="file-meta">
        <div class="file-name" id="file-name"></div>
        <div class="file-detail" id="file-detail"></div>
      </div>
      <button class="sm-link" onclick="loadNew()">换一个</button>
    </div>

    <!-- 进度条 -->
    <div class="progress-section">
      <div class="progress-track" id="progress-track">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
        <div class="progress-thumb" id="progress-thumb" style="left:0%"></div>
      </div>
      <div class="time-row">
        <span id="time-current">00:00</span>
        <span id="time-total">00:00</span>
      </div>
    </div>

    <!-- 播放控制 -->
    <div class="controls">
      <button class="ctrl-btn" onclick="skipTime(-10)" title="后退 10 秒">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/><text x="12" y="16" text-anchor="middle" font-size="8" fill="currentColor" stroke="none" font-weight="700">10</text></svg>
      </button>
      <button class="ctrl-btn" onclick="skipTime(-5)" title="后退 5 秒">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="11,17 6,12 11,7"/></svg>
      </button>
      <button class="play-btn" id="play-btn" onclick="togglePlay()">
        <svg id="icon-play" viewBox="0 0 24 24"><polygon points="7,3 21,12 7,21"/></svg>
        <svg id="icon-pause" viewBox="0 0 24 24" style="display:none"><rect x="5" y="3" width="5" height="18"/><rect x="14" y="3" width="5" height="18"/></svg>
      </button>
      <button class="ctrl-btn" onclick="skipTime(5)" title="前进 5 秒">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="13,7 18,12 13,17"/></svg>
      </button>
      <button class="ctrl-btn" onclick="skipTime(10)" title="前进 10 秒">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.13-9.36L23 10"/><text x="12" y="16" text-anchor="middle" font-size="8" fill="currentColor" stroke="none" font-weight="700">10</text></svg>
      </button>
    </div>

    <!-- 速度控制 -->
    <div class="speed-section">
      <span class="speed-label">播放速度</span>
      <div class="speed-btns">
        <button class="speed-btn" data-speed="0.5">0.5x</button>
        <button class="speed-btn" data-speed="0.75">0.75x</button>
        <button class="speed-btn active" data-speed="1">1x</button>
        <button class="speed-btn" data-speed="1.25">1.25x</button>
        <button class="speed-btn" data-speed="1.5">1.5x</button>
        <button class="speed-btn" data-speed="2">2x</button>
        <button class="speed-btn" data-speed="3">3x</button>
      </div>
    </div>

    <!-- 音量 -->
    <div class="volume-row">
      <div class="volume-icon" id="volume-icon" onclick="toggleMute()" title="静音/恢复">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path id="vol-wave1" d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path id="vol-wave2" d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
      </div>
      <input type="range" class="volume-slider" id="volume-slider" min="0" max="100" value="100">
      <span class="volume-val" id="volume-val">100%</span>
      <div class="volume-spacer"></div>
    </div>

    <!-- 转录区 -->
    <div class="transcribe-section">
      <div class="transcribe-header">
        <span class="title">语音转文字</span>
        <span class="hint">使用 Whisper AI 模型，首次加载需下载模型（约 40 MB）</span>
      </div>
      <div class="transcribe-settings">
        <div class="field-inline">
          <label>模型</label>
          <div class="mini-btn-group">
            <button class="mini-btn active" data-model="tiny">快速</button>
            <button class="mini-btn" data-model="base">精准</button>
          </div>
        </div>
        <div class="field-inline">
          <label>语言</label>
          <div class="mini-btn-group">
            <button class="mini-btn active" data-lang="auto">自动</button>
            <button class="mini-btn" data-lang="chinese">中文</button>
            <button class="mini-btn" data-lang="english">英语</button>
            <button class="mini-btn" data-lang="japanese">日语</button>
          </div>
        </div>
        <button id="btn-transcribe" onclick="startTranscribe()" style="margin-left:auto;padding:5px 14px;font-size:12px;">开始转录</button>
      </div>

      <div class="transcribe-progress" id="tp-area">
        <div class="tp-label" id="tp-label">准备中…</div>
        <div class="tp-bar-outer">
          <div class="tp-bar-inner" id="tp-bar" style="width:0%"></div>
        </div>
      </div>

      <div class="text-result" id="text-result">
        <div class="text-result-header">
          <span class="badge" id="text-badge">已转录</span>
          <div class="text-result-actions">
            <button onclick="copyTranscript()">复制</button>
            <button onclick="toggleTextVisibility()" id="btn-toggle-text">隐藏文字</button>
          </div>
        </div>
        <textarea class="text-area" id="text-area" placeholder="转录结果将显示在这里…" readonly></textarea>
        <div class="text-hint">所有处理在浏览器本地完成，音频不会上传到任何服务器</div>
      </div>
    </div>

    <!-- 快捷键 -->
    <div class="shortcuts">
      <kbd>Space</kbd> 播放/暂停 &nbsp;
      <kbd>←</kbd> 后退 5 秒 &nbsp;
      <kbd>→</kbd> 前进 5 秒 &nbsp;
      <kbd>↑</kbd>/<kbd>↓</kbd> 音量 &nbsp;
      <kbd>[</kbd>/<kbd>]</kbd> 减速/加速
    </div>
  </div>
</div>

<audio id="audio" preload="auto"></audio>

<script type="module">
  import { pipeline } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3';

  const audio = document.getElementById('audio');
  let isPlaying = false;
  let currentSpeed = 1;
  let isMuted = false;
  let prevVolume = 100;
  let audioFileUrl = null;

  // transcription state
  let transcriber = null;
  let loadedModelKey = '';
  let currentModel = 'tiny';
  let currentLang = 'auto';
  let textVisible = true;

  // ── 文件加载 ──
  const dz = document.getElementById('drop-zone');
  dz.addEventListener('click', () => document.getElementById('file-input').click());
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
  dz.addEventListener('drop', e => {
    e.preventDefault(); dz.classList.remove('drag-over');
    const f = [...e.dataTransfer.files].find(f => f.type.startsWith('audio/'));
    if (f) loadFile(f);
  });
  document.addEventListener('dragover', e => e.preventDefault());
  document.addEventListener('drop', e => {
    e.preventDefault();
    const f = [...e.dataTransfer.files].find(f => f.type.startsWith('audio/'));
    if (f) loadFile(f);
  });
  document.getElementById('file-input').addEventListener('change', e => {
    if (e.target.files[0]) loadFile(e.target.files[0]);
    e.target.value = '';
  });

  function loadFile(file) {
    if (audioFileUrl) URL.revokeObjectURL(audioFileUrl);
    audioFileUrl = URL.createObjectURL(file);
    audio.src = audioFileUrl;
    audio.load();
    audio.onloadedmetadata = () => {
      document.getElementById('file-name').textContent = file.name;
      document.getElementById('file-detail').textContent =
        `${fmtSize(file.size)} · ${fmtTime(audio.duration)}`;
      document.getElementById('time-total').textContent = fmtTime(audio.duration);
      updateProgress();
    };
    dz.classList.add('hidden');
    document.getElementById('main-card').style.display = '';
    isPlaying = false;
    updatePlayIcon();
    // reset transcript
    document.getElementById('text-result').classList.remove('open');
    document.getElementById('tp-area').style.display = 'none';
  }

  window.loadNew = () => document.getElementById('file-input').click();

  // ── 播放控制 ──
  window.togglePlay = function() {
    if (!audio.src) return;
    if (audio.paused) {
      audio.play();
      isPlaying = true;
    } else {
      audio.pause();
      isPlaying = false;
    }
    updatePlayIcon();
  };

  function updatePlayIcon() {
    document.getElementById('icon-play').style.display = isPlaying ? 'none' : '';
    document.getElementById('icon-pause').style.display = isPlaying ? '' : 'none';
  }

  audio.addEventListener('ended', () => { isPlaying = false; updatePlayIcon(); });
  audio.addEventListener('play', () => { isPlaying = true; updatePlayIcon(); });
  audio.addEventListener('pause', () => { isPlaying = false; updatePlayIcon(); });

  // ── 进度条 ──
  audio.addEventListener('timeupdate', updateProgress);

  function updateProgress() {
    if (!audio.duration) return;
    const pct = (audio.currentTime / audio.duration) * 100;
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('progress-thumb').style.left = pct + '%';
    document.getElementById('time-current').textContent = fmtTime(audio.currentTime);
  }

  const track = document.getElementById('progress-track');
  let seeking = false;

  function seekFromEvent(e) {
    const rect = track.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const ratio = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
    audio.currentTime = ratio * audio.duration;
    updateProgress();
  }

  track.addEventListener('mousedown', e => { seeking = true; seekFromEvent(e); });
  track.addEventListener('touchstart', e => { seeking = true; seekFromEvent(e); }, { passive: true });
  document.addEventListener('mousemove', e => { if (seeking) seekFromEvent(e); });
  document.addEventListener('touchmove', e => { if (seeking) seekFromEvent(e); }, { passive: true });
  document.addEventListener('mouseup', () => { seeking = false; });
  document.addEventListener('touchend', () => { seeking = false; });

  window.skipTime = function(delta) {
    if (!audio.duration) return;
    audio.currentTime = Math.max(0, Math.min(audio.duration, audio.currentTime + delta));
  };

  // ── 速度 ──
  const speeds = [0.5, 0.75, 1, 1.25, 1.5, 2, 3];

  document.querySelectorAll('.speed-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentSpeed = parseFloat(btn.dataset.speed);
      audio.playbackRate = currentSpeed;
    });
  });

  function changeSpeed(delta) {
    const idx = speeds.indexOf(currentSpeed);
    const newIdx = Math.max(0, Math.min(speeds.length - 1, idx + delta));
    currentSpeed = speeds[newIdx];
    audio.playbackRate = currentSpeed;
    document.querySelectorAll('.speed-btn').forEach(b => {
      b.classList.toggle('active', parseFloat(b.dataset.speed) === currentSpeed);
    });
  }

  // ── 音量 ──
  const volSlider = document.getElementById('volume-slider');
  volSlider.addEventListener('input', () => {
    const v = parseInt(volSlider.value);
    audio.volume = v / 100;
    document.getElementById('volume-val').textContent = v + '%';
    isMuted = v === 0;
    updateVolumeIcon(v);
  });

  window.toggleMute = function() {
    if (isMuted) {
      const v = prevVolume || 100;
      audio.volume = v / 100;
      volSlider.value = v;
      document.getElementById('volume-val').textContent = v + '%';
      isMuted = false;
      updateVolumeIcon(v);
    } else {
      prevVolume = parseInt(volSlider.value);
      audio.volume = 0;
      volSlider.value = 0;
      document.getElementById('volume-val').textContent = '0%';
      isMuted = true;
      updateVolumeIcon(0);
    }
  };

  function updateVolumeIcon(v) {
    document.getElementById('vol-wave1').style.display = v > 0 ? '' : 'none';
    document.getElementById('vol-wave2').style.display = v > 50 ? '' : 'none';
  }

  function changeVolume(delta) {
    const v = Math.max(0, Math.min(100, parseInt(volSlider.value) + delta));
    volSlider.value = v;
    audio.volume = v / 100;
    document.getElementById('volume-val').textContent = v + '%';
    isMuted = v === 0;
    updateVolumeIcon(v);
  }

  // ── 转录设置 ──
  document.querySelectorAll('[data-model]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-model]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentModel = btn.dataset.model;
    });
  });
  document.querySelectorAll('[data-lang]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-lang]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentLang = btn.dataset.lang;
    });
  });

  // ── 转录 ──
  window.startTranscribe = async function() {
    if (!audioFileUrl) return;

    const btn = document.getElementById('btn-transcribe');
    btn.disabled = true;
    btn.textContent = '转录中…';
    document.getElementById('text-result').classList.remove('open');
    setTP(true, 0, '准备中…');

    try {
      const modelId = `Xenova/whisper-${currentModel}`;

      if (loadedModelKey !== modelId || !transcriber) {
        setTP(true, 0, '正在加载模型…');
        transcriber = await pipeline('automatic-speech-recognition', modelId, {
          progress_callback: (p) => {
            if (p.status === 'progress' && p.progress != null) {
              setTP(true, Math.round(p.progress * 0.75), `加载模型… ${Math.round(p.progress)}%`);
            } else if (p.status === 'ready') {
              setTP(true, 78, '模型已就绪');
            }
          }
        });
        loadedModelKey = modelId;
        setTP(true, 80, '模型加载完成');
      } else {
        setTP(true, 80, '模型已缓存');
      }

      setTP(true, 80, '转录中，请稍候…');
      document.getElementById('tp-bar').classList.add('indeterminate');

      const options = { task: 'transcribe', chunk_length_s: 30, stride_length_s: 5 };
      if (currentLang !== 'auto') options.language = currentLang;

      const result = await transcriber(audioFileUrl, options);

      document.getElementById('tp-bar').classList.remove('indeterminate');
      setTP(true, 100, '转录完成');

      document.getElementById('text-area').value = (result.text || '').trim();
      document.getElementById('text-result').classList.add('open');
      textVisible = true;
      document.getElementById('btn-toggle-text').textContent = '隐藏文字';
      document.getElementById('text-area').classList.remove('hidden');

      setTimeout(() => setTP(false), 500);

    } catch (err) {
      document.getElementById('tp-bar').classList.remove('indeterminate');
      setTP(false);
      alert('转录失败：' + (err.message || err));
      console.error(err);
    }

    btn.disabled = false;
    btn.textContent = '开始转录';
  };

  function setTP(show, pct, label) {
    document.getElementById('tp-area').style.display = show ? 'flex' : 'none';
    if (show) {
      document.getElementById('tp-bar').style.width = pct + '%';
      document.getElementById('tp-label').textContent = label;
    }
  }

  // ── 文字显示/隐藏 ──
  window.toggleTextVisibility = function() {
    textVisible = !textVisible;
    document.getElementById('text-area').classList.toggle('hidden', !textVisible);
    document.getElementById('btn-toggle-text').textContent = textVisible ? '隐藏文字' : '显示文字';
  };

  window.copyTranscript = function() {
    const text = document.getElementById('text-area').value;
    if (!text) return;
    navigator.clipboard.writeText(text);
  };

  // ── 键盘快捷键 ──
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;

    switch (e.key) {
      case ' ':
        e.preventDefault();
        window.togglePlay();
        break;
      case 'ArrowLeft':
        e.preventDefault();
        window.skipTime(-5);
        break;
      case 'ArrowRight':
        e.preventDefault();
        window.skipTime(5);
        break;
      case 'ArrowUp':
        e.preventDefault();
        changeVolume(5);
        break;
      case 'ArrowDown':
        e.preventDefault();
        changeVolume(-5);
        break;
      case '[':
        changeSpeed(-1);
        break;
      case ']':
        changeSpeed(1);
        break;
      case 'm':
        window.toggleMute();
        break;
    }
  });

  // ── 工具函数 ──
  function fmtTime(s) {
    if (!isFinite(s)) return '--:--';
    const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = Math.floor(s % 60);
    if (h > 0) return `${h}:${String(m).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
    return `${String(m).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
  }

  function fmtSize(b) {
    if (b < 1024) return b + ' B';
    if (b < 1024 * 1024) return (b / 1024).toFixed(1) + ' KB';
    return (b / 1024 / 1024).toFixed(1) + ' MB';
  }
</script>
</body>
