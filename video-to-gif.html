<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>视频转 GIF - 工具箱</title>
  <style>
    :root {
      --bg: #f7f8fa; --surface: #fff; --border: #e8eaed;
      --text: #1f2329; --text-secondary: #646a73; --text-muted: #8f959e;
      --primary: #2563eb; --primary-light: #eff6ff;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 12px rgba(0,0,0,.04);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Segoe UI", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

    nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; height: 52px; display: flex; align-items: center; gap: 16px; }
    .back { text-decoration: none; color: var(--text-secondary); font-size: 13px; display: flex; align-items: center; gap: 4px; padding: 4px 8px; border-radius: 6px; }
    .back:hover { background: var(--bg); color: var(--text); }
    nav h1 { font-size: 15px; font-weight: 600; }

    .container { max-width: 780px; margin: 0 auto; padding: 24px; width: 100%; flex: 1; display: flex; flex-direction: column; gap: 16px; }

    .drop-zone { border: 2px dashed #c8cdd4; border-radius: var(--radius); padding: 48px 40px; text-align: center; color: var(--text-muted); font-size: 14px; cursor: pointer; transition: all .2s; background: var(--surface); }
    .drop-zone:hover, .drop-zone.drag-over { border-color: var(--primary); background: var(--primary-light); color: var(--primary); }
    .drop-zone.hidden { display: none; }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }

    .video-wrap { background: #000; display: flex; justify-content: center; }
    video { max-width: 100%; max-height: 320px; display: block; }

    .file-info { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-bottom: 1px solid var(--border); }
    .file-icon { width: 40px; height: 40px; background: var(--primary-light); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    .file-meta { flex: 1; min-width: 0; }
    .file-name { font-size: 14px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-detail { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
    button.sm-link { background: none; border: none; color: var(--text-muted); font-size: 12px; cursor: pointer; padding: 4px; text-decoration: underline; }
    button.sm-link:hover { color: var(--text); }

    .settings { padding: 16px; display: flex; flex-direction: column; gap: 14px; border-bottom: 1px solid var(--border); }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field > label { font-size: 12px; color: var(--text-muted); font-weight: 500; }
    .row { display: flex; gap: 12px; }
    .row .field { flex: 1; }
    .field input, .field select { padding: 7px 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; outline: none; background: var(--bg); }
    .field input:focus, .field select:focus { border-color: var(--primary); }

    .btn-group { display: flex; gap: 6px; }
    .opt-btn { flex: 1; padding: 7px 10px; border-radius: 8px; border: 1.5px solid var(--border); background: var(--bg); font-size: 13px; font-weight: 500; cursor: pointer; text-align: center; transition: all .15s; }
    .opt-btn.active { background: var(--primary-light); color: var(--primary); border-color: var(--primary); }
    .opt-btn:hover:not(.active) { border-color: #b0b8c8; }

    .slider-row { display: flex; align-items: center; gap: 10px; }
    .slider-row input[type=range] { flex: 1; accent-color: var(--primary); }
    .slider-val { font-size: 13px; color: var(--text-secondary); min-width: 40px; text-align: right; font-variant-numeric: tabular-nums; }

    .progress-area { padding: 16px; border-top: 1px solid var(--border); display: none; flex-direction: column; gap: 8px; }
    .progress-bar-outer { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .progress-bar-inner { height: 100%; background: var(--primary); border-radius: 3px; transition: width .2s; }
    .progress-label { font-size: 13px; color: var(--text-secondary); }

    .result-area { padding: 16px; border-top: 1px solid var(--border); display: none; flex-direction: column; gap: 10px; align-items: center; }
    .result-area img { max-width: 100%; border-radius: 8px; border: 1px solid var(--border); }
    .result-meta { font-size: 12px; color: var(--text-muted); }

    .actions { padding: 14px 16px; border-top: 1px solid var(--border); display: flex; gap: 10px; }
    button { padding: 8px 18px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); font-size: 13px; cursor: pointer; transition: all .15s; font-weight: 500; }
    button:hover:not(:disabled) { background: var(--bg); }
    button:disabled { opacity: .4; cursor: not-allowed; }
    button.primary { background: var(--primary); color: #fff; border-color: var(--primary); flex: 1; }
    button.primary:hover:not(:disabled) { background: #1d4ed8; }
    button.download { background: #16a34a; color: #fff; border-color: #16a34a; }
    button.download:hover:not(:disabled) { background: #15803d; }

    canvas { display: none; }
  </style>
</head>
<body>
<nav>
  <a href="index.html" class="back">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    返回
  </a>
  <h1>🌀 视频转 GIF</h1>
</nav>

<div class="container">
  <div class="drop-zone" id="drop-zone">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin-bottom:12px;opacity:.4"><rect x="3" y="3" width="18" height="18" rx="2"/><polygon points="5,17 10,12 13,15 17,10 22,17"/></svg>
    <div>拖放视频到此处，或<b>点击选择</b></div>
    <div style="font-size:12px;margin-top:6px;color:#aaa">支持 MP4、WebM、MOV 等格式</div>
  </div>
  <input type="file" id="file-input" accept="video/*" style="display:none">

  <div class="card" id="main-card" style="display:none">
    <div class="video-wrap">
      <video id="video" controls muted></video>
    </div>

    <div class="file-info">
      <div class="file-icon">🎬</div>
      <div class="file-meta">
        <div class="file-name" id="file-name"></div>
        <div class="file-detail" id="file-detail"></div>
      </div>
      <button class="sm-link" onclick="document.getElementById('file-input').click()">换一个</button>
    </div>

    <div class="settings">
      <div class="row">
        <div class="field">
          <label>开始时间（秒）</label>
          <input type="number" id="start-time" value="0" min="0" step="0.1">
        </div>
        <div class="field">
          <label>结束时间（秒）</label>
          <input type="number" id="end-time" value="5" min="0" step="0.1">
        </div>
      </div>

      <div class="field">
        <label>帧率</label>
        <div class="btn-group">
          <div class="opt-btn" data-fps="5">5 fps</div>
          <div class="opt-btn active" data-fps="10">10 fps</div>
          <div class="opt-btn" data-fps="15">15 fps</div>
          <div class="opt-btn" data-fps="24">24 fps</div>
        </div>
      </div>

      <div class="field">
        <label>输出宽度</label>
        <div class="slider-row">
          <input type="range" id="width-slider" min="100" max="800" step="10" value="480">
          <span class="slider-val" id="width-val">480px</span>
        </div>
      </div>
    </div>

    <div class="progress-area" id="progress-area">
      <div class="progress-label" id="progress-label">提取帧…</div>
      <div class="progress-bar-outer">
        <div class="progress-bar-inner" id="progress-bar" style="width:0%"></div>
      </div>
    </div>

    <div class="result-area" id="result-area">
      <img id="result-img">
      <div class="result-meta" id="result-meta"></div>
    </div>

    <div class="actions">
      <button class="primary" id="btn-convert" onclick="convertToGif()">生成 GIF</button>
      <button class="download" id="btn-download" onclick="downloadGif()" disabled style="display:none">⬇ 下载</button>
    </div>
  </div>
</div>

<canvas id="canvas"></canvas>

<script>
  const video = document.getElementById('video');
  let currentFile = null;
  let resultUrl = null;
  let resultFilename = '';
  let fps = 10;
  let outWidth = 480;

  const dz = document.getElementById('drop-zone');
  dz.addEventListener('click', () => document.getElementById('file-input').click());
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
  dz.addEventListener('drop', e => {
    e.preventDefault(); dz.classList.remove('drag-over');
    const f = [...e.dataTransfer.files].find(f => f.type.startsWith('video/'));
    if (f) loadFile(f);
  });
  document.addEventListener('dragover', e => e.preventDefault());
  document.addEventListener('drop', e => {
    e.preventDefault();
    const f = [...e.dataTransfer.files].find(f => f.type.startsWith('video/'));
    if (f) loadFile(f);
  });
  document.getElementById('file-input').addEventListener('change', e => {
    if (e.target.files[0]) loadFile(e.target.files[0]);
    e.target.value = '';
  });

  function loadFile(file) {
    currentFile = file;
    video.src = URL.createObjectURL(file);
    video.onloadedmetadata = () => {
      document.getElementById('file-name').textContent = file.name;
      document.getElementById('file-detail').textContent =
        `${fmtSize(file.size)} · ${video.videoWidth}×${video.videoHeight} · ${fmtTime(video.duration)}`;
      document.getElementById('start-time').value = 0;
      document.getElementById('end-time').value = Math.min(5, video.duration).toFixed(1);
    };
    dz.classList.add('hidden');
    document.getElementById('main-card').style.display = '';
  }

  // options
  document.querySelectorAll('[data-fps]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-fps]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      fps = parseInt(btn.dataset.fps);
    });
  });
  document.getElementById('width-slider').addEventListener('input', function() {
    outWidth = parseInt(this.value);
    document.getElementById('width-val').textContent = outWidth + 'px';
  });

  // ── GIF 转换 ──
  async function convertToGif() {
    const startT = parseFloat(document.getElementById('start-time').value) || 0;
    const endT = parseFloat(document.getElementById('end-time').value) || 5;
    if (endT <= startT) { alert('结束时间须大于开始时间'); return; }

    document.getElementById('btn-convert').disabled = true;
    document.getElementById('btn-download').style.display = 'none';
    document.getElementById('result-area').style.display = 'none';
    setProgress(true, 0, '提取帧…');

    const canvas = document.getElementById('canvas');
    const scale = outWidth / video.videoWidth;
    const w = outWidth;
    const h = Math.round(video.videoHeight * scale);
    canvas.width = w;
    canvas.height = h;
    const ctx = canvas.getContext('2d');

    const interval = 1 / fps;
    const totalFrames = Math.ceil((endT - startT) * fps);
    const frames = [];

    // extract frames
    for (let i = 0; i < totalFrames; i++) {
      const t = startT + i * interval;
      video.currentTime = t;
      await new Promise(r => { video.onseeked = r; });
      ctx.drawImage(video, 0, 0, w, h);
      frames.push(ctx.getImageData(0, 0, w, h));
      setProgress(true, ((i + 1) / totalFrames * 50), `提取帧 ${i + 1}/${totalFrames}`);
    }

    setProgress(true, 55, '编码 GIF…');

    // encode GIF
    const delay = Math.round(1000 / fps);
    const blob = await encodeGif(w, h, frames, delay, (p) => {
      setProgress(true, 55 + p * 40, `编码 GIF… ${Math.round(p * 100)}%`);
    });

    setProgress(true, 100, '完成');

    if (resultUrl) URL.revokeObjectURL(resultUrl);
    resultUrl = URL.createObjectURL(blob);
    resultFilename = currentFile.name.replace(/\.[^.]+$/, '') + '.gif';

    document.getElementById('result-img').src = resultUrl;
    document.getElementById('result-meta').textContent =
      `${w}×${h} · ${totalFrames} 帧 · ${fmtSize(blob.size)}`;
    document.getElementById('result-area').style.display = 'flex';
    document.getElementById('btn-download').style.display = '';
    document.getElementById('btn-download').disabled = false;
    setProgress(false);
    document.getElementById('btn-convert').disabled = false;
  }

  function downloadGif() {
    if (!resultUrl) return;
    const a = document.createElement('a');
    a.href = resultUrl;
    a.download = resultFilename;
    a.click();
  }

  // ── Minimal GIF encoder (GIF89a with LZW) ──
  async function encodeGif(width, height, frames, delay, onProgress) {
    // build global color table from first frame (median-cut quantize to 256)
    const out = [];
    const write = b => out.push(b);
    const writeBytes = arr => arr.forEach(b => out.push(b));
    const writeStr = s => { for (let i = 0; i < s.length; i++) out.push(s.charCodeAt(i)); };
    const le16 = v => [v & 0xff, (v >> 8) & 0xff];

    // Header
    writeStr('GIF89a');
    writeBytes(le16(width));
    writeBytes(le16(height));
    write(0xf7); // GCT flag, 8 bit color
    write(0);    // bg color
    write(0);    // pixel aspect

    // Global Color Table (256 entries) - simple uniform palette
    const palette = buildUniformPalette();
    for (let i = 0; i < 256; i++) {
      write(palette[i * 3]);
      write(palette[i * 3 + 1]);
      write(palette[i * 3 + 2]);
    }

    // Netscape extension for looping
    write(0x21); write(0xff); write(11);
    writeStr('NETSCAPE2.0');
    write(3); write(1);
    writeBytes(le16(0)); // loop forever
    write(0);

    for (let f = 0; f < frames.length; f++) {
      const data = frames[f].data;

      // Graphics Control Extension
      write(0x21); write(0xf9); write(4);
      write(0x00); // no disposal, no transparency
      writeBytes(le16(Math.round(delay / 10))); // delay in 1/100 sec
      write(0); // transparent color
      write(0);

      // Image Descriptor
      write(0x2c);
      writeBytes(le16(0)); writeBytes(le16(0)); // x, y
      writeBytes(le16(width)); writeBytes(le16(height));
      write(0); // no local color table

      // LZW compress
      const indexed = quantizeFrame(data, palette);
      const minCodeSize = 8;
      const lzwData = lzwEncode(indexed, minCodeSize);
      write(minCodeSize);

      // write sub-blocks
      let pos = 0;
      while (pos < lzwData.length) {
        const chunk = Math.min(255, lzwData.length - pos);
        write(chunk);
        for (let i = 0; i < chunk; i++) write(lzwData[pos++]);
      }
      write(0); // block terminator

      if (f % 5 === 0) {
        onProgress(f / frames.length);
        await new Promise(r => setTimeout(r, 0));
      }
    }

    write(0x3b); // trailer
    onProgress(1);
    return new Blob([new Uint8Array(out)], { type: 'image/gif' });
  }

  function buildUniformPalette() {
    // 6×6×6 color cube + extra grays = 256 entries
    const p = new Uint8Array(256 * 3);
    let idx = 0;
    for (let r = 0; r < 6; r++)
      for (let g = 0; g < 6; g++)
        for (let b = 0; b < 6; b++) {
          p[idx * 3] = Math.round(r * 51);
          p[idx * 3 + 1] = Math.round(g * 51);
          p[idx * 3 + 2] = Math.round(b * 51);
          idx++;
        }
    // fill remaining 40 with grays
    for (let i = 0; i < 40; i++) {
      const v = Math.round(i * 255 / 39);
      p[idx * 3] = v;
      p[idx * 3 + 1] = v;
      p[idx * 3 + 2] = v;
      idx++;
    }
    return p;
  }

  function quantizeFrame(rgba, palette) {
    const n = rgba.length / 4;
    const out = new Uint8Array(n);
    for (let i = 0; i < n; i++) {
      const r = rgba[i * 4], g = rgba[i * 4 + 1], b = rgba[i * 4 + 2];
      // fast nearest in 6×6×6 cube
      const ri = Math.min(5, Math.round(r / 51));
      const gi = Math.min(5, Math.round(g / 51));
      const bi = Math.min(5, Math.round(b / 51));
      out[i] = ri * 36 + gi * 6 + bi;
    }
    return out;
  }

  function lzwEncode(indexed, minCodeSize) {
    const clearCode = 1 << minCodeSize;
    const eoiCode = clearCode + 1;
    let codeSize = minCodeSize + 1;
    let nextCode = eoiCode + 1;
    const maxCode = 4095;

    const table = new Map();
    const output = [];
    let buf = 0, bits = 0;

    const emit = code => {
      buf |= code << bits;
      bits += codeSize;
      while (bits >= 8) { output.push(buf & 0xff); buf >>= 8; bits -= 8; }
    };

    const resetTable = () => {
      table.clear();
      for (let i = 0; i < clearCode; i++) table.set(String(i), i);
      codeSize = minCodeSize + 1;
      nextCode = eoiCode + 1;
    };

    emit(clearCode);
    resetTable();

    let prev = String(indexed[0]);
    for (let i = 1; i < indexed.length; i++) {
      const curr = String(indexed[i]);
      const key = prev + ',' + curr;
      if (table.has(key)) {
        prev = key;
      } else {
        emit(table.get(prev));
        if (nextCode <= maxCode) {
          table.set(key, nextCode++);
          if (nextCode > (1 << codeSize) && codeSize < 12) codeSize++;
        } else {
          emit(clearCode);
          resetTable();
        }
        prev = curr;
      }
    }
    emit(table.get(prev));
    emit(eoiCode);
    if (bits > 0) output.push(buf & 0xff);
    return output;
  }

  // utils
  function setProgress(show, pct, label) {
    const el = document.getElementById('progress-area');
    el.style.display = show ? 'flex' : 'none';
    if (show) {
      document.getElementById('progress-bar').style.width = pct + '%';
      document.getElementById('progress-label').textContent = label;
    }
  }
  function fmtTime(s) {
    if (!isFinite(s)) return '--:--';
    const m = Math.floor(s / 60), sec = Math.floor(s % 60);
    return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  }
  function fmtSize(b) {
    if (b < 1024) return b + ' B';
    if (b < 1024 * 1024) return (b / 1024).toFixed(1) + ' KB';
    return (b / 1024 / 1024).toFixed(1) + ' MB';
  }
</script>
</body>
</html>
