<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Base64 编解码 - 工具箱</title>
  <style>
    :root {
      --bg: #f7f8fa; --surface: #fff; --border: #e8eaed;
      --text: #1f2329; --text-secondary: #646a73; --text-muted: #8f959e;
      --primary: #2563eb; --primary-light: #eff6ff;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 12px rgba(0,0,0,.04);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Segoe UI", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

    nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; height: 52px; display: flex; align-items: center; gap: 16px; }
    .back { text-decoration: none; color: var(--text-secondary); font-size: 13px; display: flex; align-items: center; gap: 4px; padding: 4px 8px; border-radius: 6px; }
    .back:hover { background: var(--bg); color: var(--text); }
    nav h1 { font-size: 15px; font-weight: 600; }

    .container { max-width: 900px; margin: 0 auto; padding: 24px; width: 100%; flex: 1; display: flex; flex-direction: column; gap: 16px; }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); padding: 16px; display: flex; flex-direction: column; gap: 12px; }

    .tabs { display: flex; gap: 4px; }
    .tab { padding: 7px 16px; border-radius: 8px; border: 1.5px solid var(--border); background: var(--bg); font-size: 13px; font-weight: 500; cursor: pointer; transition: all .15s; }
    .tab.active { background: var(--primary-light); color: var(--primary); border-color: var(--primary); }
    .tab:hover:not(.active) { border-color: #b0b8c8; }

    .section { display: none; flex-direction: column; gap: 12px; }
    .section.active { display: flex; }

    label.field-label { font-size: 12px; color: var(--text-muted); font-weight: 500; }

    textarea { resize: vertical; min-height: 140px; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-family: "SF Mono", Consolas, monospace; font-size: 13px; line-height: 1.5; background: var(--bg); color: var(--text); outline: none; }
    textarea:focus { border-color: var(--primary); }

    .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
    button { padding: 7px 16px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); font-size: 13px; cursor: pointer; transition: all .15s; font-weight: 500; }
    button:hover { background: var(--bg); }
    button.primary { background: var(--primary); color: #fff; border-color: var(--primary); }
    button.primary:hover { background: #1d4ed8; }

    .drop-zone { border: 2px dashed #c8cdd4; border-radius: 8px; padding: 24px; text-align: center; color: var(--text-muted); font-size: 13px; cursor: pointer; transition: all .2s; }
    .drop-zone:hover, .drop-zone.drag-over { border-color: var(--primary); background: var(--primary-light); color: var(--primary); }

    .info { font-size: 12px; color: var(--text-muted); }
    .error { font-size: 12px; color: #dc2626; }
    .success { font-size: 12px; color: #16a34a; }
  </style>
</head>
<body>
<nav>
  <a href="index.html" class="back">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    返回
  </a>
  <h1>🔐 Base64 编解码</h1>
</nav>

<div class="container">
  <!-- 文本编解码 -->
  <div class="card">
    <div class="tabs">
      <div class="tab active" data-tab="encode">编码</div>
      <div class="tab" data-tab="decode">解码</div>
      <div class="tab" data-tab="file">文件转 Base64</div>
    </div>

    <!-- 编码 -->
    <div class="section active" id="sec-encode">
      <label class="field-label">输入文本</label>
      <textarea id="encode-input" placeholder="输入要编码的文本…"></textarea>
      <div class="btn-row">
        <button class="primary" onclick="doEncode()">编码为 Base64</button>
        <button onclick="copyText('encode-output')">复制结果</button>
        <button onclick="swapToDecodeTab()">↔ 切换到解码</button>
      </div>
      <label class="field-label">Base64 结果</label>
      <textarea id="encode-output" placeholder="编码结果将显示在这里…" readonly></textarea>
      <span class="info" id="encode-info"></span>
    </div>

    <!-- 解码 -->
    <div class="section" id="sec-decode">
      <label class="field-label">输入 Base64</label>
      <textarea id="decode-input" placeholder="输入 Base64 字符串…"></textarea>
      <div class="btn-row">
        <button class="primary" onclick="doDecode()">解码为文本</button>
        <button onclick="copyText('decode-output')">复制结果</button>
        <button onclick="swapToEncodeTab()">↔ 切换到编码</button>
      </div>
      <label class="field-label">解码结果</label>
      <textarea id="decode-output" placeholder="解码结果将显示在这里…" readonly></textarea>
      <span class="info" id="decode-info"></span>
    </div>

    <!-- 文件 -->
    <div class="section" id="sec-file">
      <div class="drop-zone" id="file-drop">
        拖放文件到此处，或<b>点击选择</b>
      </div>
      <input type="file" id="file-input" style="display:none">
      <span class="info" id="file-info"></span>
      <label class="field-label">Base64 结果</label>
      <textarea id="file-output" placeholder="文件的 Base64 编码将显示在这里…" readonly style="min-height:100px"></textarea>
      <div class="btn-row">
        <button onclick="copyText('file-output')">复制</button>
        <button onclick="copyDataUrl()">复制为 Data URL</button>
      </div>
      <span class="info" id="file-copy-info"></span>
    </div>
  </div>
</div>

<script>
  let fileResult = { base64: '', mime: '' };

  // tabs
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('sec-' + tab.dataset.tab).classList.add('active');
    });
  });

  // encode
  function doEncode() {
    const input = document.getElementById('encode-input').value;
    try {
      const encoded = btoa(unescape(encodeURIComponent(input)));
      document.getElementById('encode-output').value = encoded;
      document.getElementById('encode-info').textContent = `原始 ${new Blob([input]).size} 字节 → Base64 ${encoded.length} 字符`;
      document.getElementById('encode-info').className = 'info';
    } catch(e) {
      document.getElementById('encode-info').textContent = '编码失败：' + e.message;
      document.getElementById('encode-info').className = 'error';
    }
  }

  // decode
  function doDecode() {
    const input = document.getElementById('decode-input').value.trim();
    try {
      const decoded = decodeURIComponent(escape(atob(input)));
      document.getElementById('decode-output').value = decoded;
      document.getElementById('decode-info').textContent = `Base64 ${input.length} 字符 → 原始 ${new Blob([decoded]).size} 字节`;
      document.getElementById('decode-info').className = 'info';
    } catch(e) {
      document.getElementById('decode-info').textContent = '解码失败：输入不是有效的 Base64 字符串';
      document.getElementById('decode-info').className = 'error';
    }
  }

  function swapToDecodeTab() {
    const val = document.getElementById('encode-output').value;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelector('[data-tab="decode"]').classList.add('active');
    document.getElementById('sec-decode').classList.add('active');
    if (val) document.getElementById('decode-input').value = val;
  }

  function swapToEncodeTab() {
    const val = document.getElementById('decode-output').value;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelector('[data-tab="encode"]').classList.add('active');
    document.getElementById('sec-encode').classList.add('active');
    if (val) document.getElementById('encode-input').value = val;
  }

  // file
  const fileDrop = document.getElementById('file-drop');
  const fileInput = document.getElementById('file-input');

  fileDrop.addEventListener('click', () => fileInput.click());
  fileDrop.addEventListener('dragover', e => { e.preventDefault(); fileDrop.classList.add('drag-over'); });
  fileDrop.addEventListener('dragleave', () => fileDrop.classList.remove('drag-over'));
  fileDrop.addEventListener('drop', e => {
    e.preventDefault(); fileDrop.classList.remove('drag-over');
    if (e.dataTransfer.files[0]) readFile(e.dataTransfer.files[0]);
  });
  fileInput.addEventListener('change', e => {
    if (e.target.files[0]) readFile(e.target.files[0]);
    e.target.value = '';
  });

  function readFile(file) {
    const reader = new FileReader();
    reader.onload = () => {
      const dataUrl = reader.result;
      const base64 = dataUrl.split(',')[1] || '';
      fileResult.base64 = base64;
      fileResult.mime = file.type || 'application/octet-stream';
      document.getElementById('file-output').value = base64;
      document.getElementById('file-info').textContent =
        `${file.name} · ${fmtSize(file.size)} → Base64 ${base64.length} 字符`;
    };
    reader.readAsDataURL(file);
  }

  function copyDataUrl() {
    if (!fileResult.base64) return;
    const url = `data:${fileResult.mime};base64,${fileResult.base64}`;
    navigator.clipboard.writeText(url).then(() => {
      document.getElementById('file-copy-info').textContent = '已复制 Data URL ✓';
      document.getElementById('file-copy-info').className = 'success';
    });
  }

  function copyText(id) {
    const val = document.getElementById(id).value;
    if (!val) return;
    navigator.clipboard.writeText(val).then(() => {
      // brief feedback
    });
  }

  function fmtSize(b) {
    if (b < 1024) return b + ' B';
    if (b < 1024 * 1024) return (b / 1024).toFixed(1) + ' KB';
    return (b / 1024 / 1024).toFixed(1) + ' MB';
  }
</script>
</body>
</html>
