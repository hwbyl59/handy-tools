<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>音频剪辑 - 工具箱</title>
  <script src="https://cdn.jsdelivr.net/npm/lamejs@1.2.1/lame.min.js"></script>
  <style>
    :root {
      --bg: #f7f8fa; --surface: #fff; --border: #e8eaed;
      --text: #1f2329; --text-secondary: #646a73; --text-muted: #8f959e;
      --primary: #2563eb; --primary-light: #eff6ff;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 12px rgba(0,0,0,.04);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Segoe UI", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

    nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; height: 52px; display: flex; align-items: center; gap: 16px; }
    .back { text-decoration: none; color: var(--text-secondary); font-size: 13px; display: flex; align-items: center; gap: 4px; padding: 4px 8px; border-radius: 6px; }
    .back:hover { background: var(--bg); color: var(--text); }
    nav h1 { font-size: 15px; font-weight: 600; }

    .container { max-width: 780px; margin: 0 auto; padding: 24px; width: 100%; flex: 1; display: flex; flex-direction: column; gap: 16px; }

    .drop-zone { border: 2px dashed #c8cdd4; border-radius: var(--radius); padding: 48px 40px; text-align: center; color: var(--text-muted); font-size: 14px; cursor: pointer; transition: all .2s; background: var(--surface); }
    .drop-zone:hover, .drop-zone.drag-over { border-color: var(--primary); background: var(--primary-light); color: var(--primary); }
    .drop-zone.hidden { display: none; }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }

    /* 文件信息 */
    .file-info { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-bottom: 1px solid var(--border); }
    .file-icon { width: 40px; height: 40px; background: var(--primary-light); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    .file-meta { flex: 1; min-width: 0; }
    .file-name { font-size: 14px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-detail { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
    button.sm-link { background: none; border: none; color: var(--text-muted); font-size: 12px; cursor: pointer; padding: 4px; text-decoration: underline; }
    button.sm-link:hover { color: var(--text); }

    /* 波形区域 */
    .waveform-section { padding: 16px; border-bottom: 1px solid var(--border); }
    .waveform-wrap { position: relative; height: 120px; background: var(--bg); border-radius: 8px; overflow: hidden; cursor: pointer; user-select: none; }
    .waveform-canvas { width: 100%; height: 100%; display: block; }
    .wf-selection { position: absolute; top: 0; height: 100%; background: rgba(37, 99, 235, .12); pointer-events: none; }
    .wf-handle { position: absolute; top: 0; width: 3px; height: 100%; background: var(--primary); cursor: ew-resize; z-index: 2; }
    .wf-handle::after { content: ''; position: absolute; top: 50%; transform: translateY(-50%); width: 11px; height: 24px; background: var(--primary); border-radius: 4px; left: -4px; }
    .wf-handle-left { left: 0; }
    .wf-handle-right { right: 0; }
    .wf-playhead { position: absolute; top: 0; width: 2px; height: 100%; background: #ef4444; pointer-events: none; z-index: 3; display: none; }
    .wf-time { display: flex; justify-content: space-between; margin-top: 6px; font-size: 11px; color: var(--text-muted); }

    /* 播放控制 */
    .playback { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 1px solid var(--border); }
    .play-btn { width: 36px; height: 36px; border-radius: 50%; border: 1.5px solid var(--border); background: var(--surface); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all .15s; flex-shrink: 0; }
    .play-btn:hover { background: var(--primary-light); border-color: var(--primary); }
    .play-btn svg { width: 16px; height: 16px; fill: var(--text); }
    .play-time { font-size: 13px; color: var(--text-secondary); font-variant-numeric: tabular-nums; }
    .selection-label { margin-left: auto; font-size: 12px; color: var(--text-muted); padding: 3px 10px; background: var(--bg); border-radius: 6px; border: 1px solid var(--border); }

    /* 设置区 */
    .settings { padding: 16px; display: flex; flex-direction: column; gap: 14px; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 12px; color: var(--text-muted); font-weight: 500; }
    .btn-group { display: flex; gap: 6px; }
    .opt-btn { flex: 1; padding: 7px 10px; border-radius: 8px; border: 1.5px solid var(--border); background: var(--bg); font-size: 13px; font-weight: 500; cursor: pointer; text-align: center; transition: all .15s; }
    .opt-btn.active { background: var(--primary-light); color: var(--primary); border-color: var(--primary); }
    .opt-btn:hover:not(.active) { border-color: #b0b8c8; }

    /* 时间输入 */
    .trim-row { display: flex; gap: 12px; align-items: center; }
    .time-field { display: flex; flex-direction: column; gap: 4px; flex: 1; }
    .time-field label { font-size: 11px; color: var(--text-muted); }
    .time-field input { padding: 7px 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; outline: none; background: var(--bg); font-variant-numeric: tabular-nums; }
    .time-field input:focus { border-color: var(--primary); }

    /* 进度 */
    .progress-area { padding: 16px; border-top: 1px solid var(--border); display: none; flex-direction: column; gap: 8px; }
    .progress-bar-outer { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .progress-bar-inner { height: 100%; background: var(--primary); border-radius: 3px; transition: width .2s; }
    .progress-label { font-size: 13px; color: var(--text-secondary); }

    /* 结果 */
    .result-area { padding: 16px; border-top: 1px solid var(--border); display: none; align-items: center; gap: 12px; }
    .result-icon { font-size: 28px; }
    .result-info { flex: 1; }
    .result-name { font-size: 14px; font-weight: 500; }
    .result-detail { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
    audio { display: block; width: 100%; margin-top: 8px; }

    /* 底部按钮 */
    .actions { padding: 14px 16px; border-top: 1px solid var(--border); display: flex; gap: 10px; }
    button { padding: 8px 18px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); font-size: 13px; cursor: pointer; transition: all .15s; font-weight: 500; }
    button:hover:not(:disabled) { background: var(--bg); }
    button:disabled { opacity: .4; cursor: not-allowed; }
    button.primary { background: var(--primary); color: #fff; border-color: var(--primary); flex: 1; }
    button.primary:hover:not(:disabled) { background: #1d4ed8; }
    button.download { background: #16a34a; color: #fff; border-color: #16a34a; }
    button.download:hover:not(:disabled) { background: #15803d; }
  </style>
</head>
<body>
<nav>
  <a href="index.html" class="back">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    返回
  </a>
  <h1>✂️ 音频剪辑</h1>
</nav>

<div class="container">
  <div class="drop-zone" id="drop-zone">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin-bottom:12px;opacity:.4"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
    <div>拖放音频文件到此处，或<b>点击选择</b></div>
    <div style="font-size:12px;margin-top:6px;color:#aaa">支持 MP3、WAV、OGG、AAC、M4A、FLAC 等格式</div>
  </div>
  <input type="file" id="file-input" accept="audio/*" style="display:none">

  <div class="card" id="main-card" style="display:none">
    <!-- 文件信息 -->
    <div class="file-info">
      <div class="file-icon">🎵</div>
      <div class="file-meta">
        <div class="file-name" id="file-name"></div>
        <div class="file-detail" id="file-detail"></div>
      </div>
      <button class="sm-link" onclick="loadNew()">换一个</button>
    </div>

    <!-- 波形 -->
    <div class="waveform-section">
      <div class="waveform-wrap" id="waveform-wrap">
        <canvas class="waveform-canvas" id="waveform-canvas"></canvas>
        <div class="wf-selection" id="wf-selection"></div>
        <div class="wf-handle wf-handle-left" id="handle-left"></div>
        <div class="wf-handle wf-handle-right" id="handle-right"></div>
        <div class="wf-playhead" id="wf-playhead"></div>
      </div>
      <div class="wf-time">
        <span id="wf-time-start">00:00</span>
        <span id="wf-time-end">00:00</span>
      </div>
    </div>

    <!-- 播放控制 -->
    <div class="playback">
      <button class="play-btn" id="play-btn" onclick="togglePlay()">
        <svg id="icon-play" viewBox="0 0 24 24"><polygon points="6,3 20,12 6,21"/></svg>
        <svg id="icon-pause" viewBox="0 0 24 24" style="display:none"><rect x="5" y="3" width="4" height="18"/><rect x="15" y="3" width="4" height="18"/></svg>
      </button>
      <span class="play-time" id="play-time">00:00 / 00:00</span>
      <span class="selection-label" id="selection-label">已选: 00:00</span>
    </div>

    <!-- 设置 -->
    <div class="settings">
      <div class="field">
        <label>选区范围（拖动波形上的滑块调整）</label>
        <div class="trim-row">
          <div class="time-field">
            <label>开始时间</label>
            <input type="text" id="trim-start" placeholder="00:00.0" value="00:00.0">
          </div>
          <div style="padding-top:20px;color:var(--text-muted)">—</div>
          <div class="time-field">
            <label>结束时间</label>
            <input type="text" id="trim-end" placeholder="00:00.0" value="00:00.0">
          </div>
        </div>
      </div>

      <div class="field">
        <label>输出格式</label>
        <div class="btn-group">
          <div class="opt-btn active" data-fmt="mp3">MP3</div>
          <div class="opt-btn" data-fmt="wav">WAV（无损）</div>
        </div>
      </div>

      <div class="field" id="bitrate-field">
        <label>MP3 码率</label>
        <div class="btn-group">
          <div class="opt-btn" data-br="128">128 kbps</div>
          <div class="opt-btn active" data-br="192">192 kbps</div>
          <div class="opt-btn" data-br="320">320 kbps</div>
        </div>
      </div>
    </div>

    <!-- 进度 -->
    <div class="progress-area" id="progress-area">
      <div class="progress-label" id="progress-label">处理中…</div>
      <div class="progress-bar-outer">
        <div class="progress-bar-inner" id="progress-bar" style="width:0%"></div>
      </div>
    </div>

    <!-- 结果 -->
    <div class="result-area" id="result-area">
      <div class="result-icon">🎵</div>
      <div class="result-info">
        <div class="result-name" id="result-name"></div>
        <div class="result-detail" id="result-detail"></div>
        <audio id="audio-result" controls></audio>
      </div>
    </div>

    <!-- 底部操作 -->
    <div class="actions">
      <button class="primary" id="btn-trim" onclick="doTrim()">导出剪辑</button>
      <button class="download" id="btn-download" onclick="downloadResult()" disabled style="display:none">⬇ 下载</button>
    </div>
  </div>
</div>

<script>
  let audioFile = null;
  let audioBuffer = null;
  let audioCtx = null;
  let sourceNode = null;
  let isPlaying = false;
  let playStartTime = 0;
  let playOffset = 0;
  let animFrame = null;

  let selStart = 0;   // seconds
  let selEnd = 0;      // seconds
  let duration = 0;

  let resultBlob = null;
  let resultFilename = '';
  let currentFmt = 'mp3';
  let currentBr = 192;

  let dragging = null; // 'left' | 'right' | null

  // ── 文件加载 ──
  const dz = document.getElementById('drop-zone');
  dz.addEventListener('click', () => document.getElementById('file-input').click());
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
  dz.addEventListener('drop', e => {
    e.preventDefault(); dz.classList.remove('drag-over');
    const f = [...e.dataTransfer.files].find(f => f.type.startsWith('audio/'));
    if (f) loadFile(f);
  });
  document.addEventListener('dragover', e => e.preventDefault());
  document.addEventListener('drop', e => {
    e.preventDefault();
    const f = [...e.dataTransfer.files].find(f => f.type.startsWith('audio/'));
    if (f) loadFile(f);
  });
  document.getElementById('file-input').addEventListener('change', e => {
    if (e.target.files[0]) loadFile(e.target.files[0]);
    e.target.value = '';
  });

  async function loadFile(file) {
    audioFile = file;
    stopPlay();
    resetResult();

    document.getElementById('file-name').textContent = file.name;
    document.getElementById('file-detail').textContent = `${fmtSize(file.size)} · 解码中…`;

    dz.classList.add('hidden');
    document.getElementById('main-card').style.display = '';

    try {
      const arrayBuffer = await file.arrayBuffer();
      if (audioCtx) await audioCtx.close();
      audioCtx = new AudioContext();
      audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
      duration = audioBuffer.duration;
      selStart = 0;
      selEnd = duration;

      document.getElementById('file-detail').textContent =
        `${fmtSize(file.size)} · ${fmtTime(duration)} · ${audioBuffer.sampleRate} Hz · ${audioBuffer.numberOfChannels === 1 ? '单声道' : '立体声'}`;

      drawWaveform();
      updateSelectionUI();
      updateTrimInputs();
    } catch (err) {
      document.getElementById('file-detail').textContent = '解码失败，请确认文件格式受浏览器支持';
      console.error(err);
    }
  }

  function loadNew() { document.getElementById('file-input').click(); }

  // ── 波形绘制 ──
  function drawWaveform() {
    const canvas = document.getElementById('waveform-canvas');
    const wrap = document.getElementById('waveform-wrap');
    const dpr = window.devicePixelRatio || 1;
    const w = wrap.clientWidth;
    const h = wrap.clientHeight;
    canvas.width = w * dpr;
    canvas.height = h * dpr;
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);

    const data = audioBuffer.getChannelData(0);
    const step = Math.ceil(data.length / w);
    const mid = h / 2;

    ctx.clearRect(0, 0, w, h);
    ctx.fillStyle = '#d1d5db';
    for (let i = 0; i < w; i++) {
      let min = 1, max = -1;
      const start = i * step;
      for (let j = 0; j < step && start + j < data.length; j++) {
        const v = data[start + j];
        if (v < min) min = v;
        if (v > max) max = v;
      }
      const top = (1 - max) * mid;
      const bottom = (1 - min) * mid;
      ctx.fillRect(i, top, 1, Math.max(1, bottom - top));
    }

    // redraw selected region highlight
    ctx.fillStyle = 'rgba(37, 99, 235, .35)';
    const x1 = (selStart / duration) * w;
    const x2 = (selEnd / duration) * w;
    // re-draw selected bars with primary color
    for (let i = Math.floor(x1); i < Math.ceil(x2) && i < w; i++) {
      let min = 1, max = -1;
      const start = i * step;
      for (let j = 0; j < step && start + j < data.length; j++) {
        const v = data[start + j];
        if (v < min) min = v;
        if (v > max) max = v;
      }
      const top = (1 - max) * mid;
      const bottom = (1 - min) * mid;
      ctx.fillRect(i, top, 1, Math.max(1, bottom - top));
    }

    document.getElementById('wf-time-start').textContent = fmtTimePrecise(0);
    document.getElementById('wf-time-end').textContent = fmtTimePrecise(duration);
  }

  // ── 选区 UI ──
  function updateSelectionUI() {
    const wrap = document.getElementById('waveform-wrap');
    const w = wrap.clientWidth;
    const x1 = (selStart / duration) * w;
    const x2 = (selEnd / duration) * w;

    document.getElementById('wf-selection').style.left = x1 + 'px';
    document.getElementById('wf-selection').style.width = (x2 - x1) + 'px';
    document.getElementById('handle-left').style.left = (x1 - 1) + 'px';
    document.getElementById('handle-right').style.left = (x2 - 2) + 'px';

    const selDur = selEnd - selStart;
    document.getElementById('selection-label').textContent = `已选: ${fmtTimePrecise(selDur)}`;
    document.getElementById('play-time').textContent = `${fmtTimePrecise(selStart)} / ${fmtTimePrecise(selEnd)}`;
  }

  function updateTrimInputs() {
    document.getElementById('trim-start').value = fmtTimePrecise(selStart);
    document.getElementById('trim-end').value = fmtTimePrecise(selEnd);
  }

  // ── 拖拽手柄 ──
  document.getElementById('handle-left').addEventListener('mousedown', e => { e.preventDefault(); dragging = 'left'; });
  document.getElementById('handle-right').addEventListener('mousedown', e => { e.preventDefault(); dragging = 'right'; });
  document.getElementById('handle-left').addEventListener('touchstart', e => { e.preventDefault(); dragging = 'left'; }, { passive: false });
  document.getElementById('handle-right').addEventListener('touchstart', e => { e.preventDefault(); dragging = 'right'; }, { passive: false });

  document.addEventListener('mousemove', onDragMove);
  document.addEventListener('touchmove', onDragMove, { passive: false });
  document.addEventListener('mouseup', () => { dragging = null; });
  document.addEventListener('touchend', () => { dragging = null; });

  function onDragMove(e) {
    if (!dragging || !duration) return;
    e.preventDefault();
    const wrap = document.getElementById('waveform-wrap');
    const rect = wrap.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const ratio = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
    const t = ratio * duration;

    if (dragging === 'left') {
      selStart = Math.min(t, selEnd - 0.05);
      selStart = Math.max(0, selStart);
    } else {
      selEnd = Math.max(t, selStart + 0.05);
      selEnd = Math.min(duration, selEnd);
    }

    drawWaveform();
    updateSelectionUI();
    updateTrimInputs();
  }

  // 点击波形定位播放头
  document.getElementById('waveform-wrap').addEventListener('click', function(e) {
    if (dragging) return;
    if (e.target.id === 'handle-left' || e.target.id === 'handle-right') return;
    const rect = this.getBoundingClientRect();
    const ratio = (e.clientX - rect.left) / rect.width;
    const t = ratio * duration;
    // If clicking inside selection, seek playback there
    if (t >= selStart && t <= selEnd) {
      stopPlay();
      playOffset = t;
      startPlay();
    }
  });

  // 时间输入同步到选区
  document.getElementById('trim-start').addEventListener('change', function() {
    const t = parseTimePrecise(this.value);
    if (isFinite(t) && t >= 0 && t < selEnd) {
      selStart = t;
      drawWaveform();
      updateSelectionUI();
    } else {
      this.value = fmtTimePrecise(selStart);
    }
  });
  document.getElementById('trim-end').addEventListener('change', function() {
    const t = parseTimePrecise(this.value);
    if (isFinite(t) && t > selStart && t <= duration) {
      selEnd = t;
      drawWaveform();
      updateSelectionUI();
    } else {
      this.value = fmtTimePrecise(selEnd);
    }
  });

  // ── 播放控制 ──
  function togglePlay() {
    if (isPlaying) stopPlay();
    else startPlay();
  }

  function startPlay() {
    if (!audioBuffer || !audioCtx) return;
    if (audioCtx.state === 'suspended') audioCtx.resume();

    sourceNode = audioCtx.createBufferSource();
    sourceNode.buffer = audioBuffer;
    sourceNode.connect(audioCtx.destination);

    const offset = (playOffset >= selStart && playOffset < selEnd) ? playOffset : selStart;
    const playDuration = selEnd - offset;
    playStartTime = audioCtx.currentTime - offset;
    sourceNode.start(0, offset, playDuration);
    sourceNode.onended = () => {
      if (isPlaying) stopPlay();
    };

    isPlaying = true;
    document.getElementById('icon-play').style.display = 'none';
    document.getElementById('icon-pause').style.display = '';
    animatePlayhead();
  }

  function stopPlay() {
    if (sourceNode) {
      try { sourceNode.stop(); } catch(e) {}
      sourceNode.disconnect();
      sourceNode = null;
    }
    isPlaying = false;
    playOffset = selStart;
    document.getElementById('icon-play').style.display = '';
    document.getElementById('icon-pause').style.display = 'none';
    document.getElementById('wf-playhead').style.display = 'none';
    if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
  }

  function animatePlayhead() {
    if (!isPlaying) return;
    const currentTime = audioCtx.currentTime - playStartTime + (playStartTime < 0 ? 0 : 0);
    const now = audioCtx.currentTime - playStartTime;

    if (now >= selEnd) {
      stopPlay();
      return;
    }

    const wrap = document.getElementById('waveform-wrap');
    const ph = document.getElementById('wf-playhead');
    const ratio = now / duration;
    ph.style.display = '';
    ph.style.left = (ratio * wrap.clientWidth) + 'px';

    document.getElementById('play-time').textContent = `${fmtTimePrecise(now)} / ${fmtTimePrecise(selEnd)}`;

    animFrame = requestAnimationFrame(animatePlayhead);
  }

  // ── 选项切换 ──
  document.querySelectorAll('[data-fmt]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-fmt]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFmt = btn.dataset.fmt;
      document.getElementById('bitrate-field').style.display = currentFmt === 'wav' ? 'none' : '';
    });
  });
  document.querySelectorAll('[data-br]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-br]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentBr = parseInt(btn.dataset.br);
    });
  });

  // ── 导出剪辑 ──
  async function doTrim() {
    if (!audioBuffer) return;
    stopPlay();

    document.getElementById('btn-trim').disabled = true;
    document.getElementById('btn-download').style.display = 'none';
    document.getElementById('result-area').style.display = 'none';
    resetProgress(true);
    setProgress(5, '裁剪音频…');

    try {
      const trimmed = sliceAudioBuffer(audioBuffer, selStart, selEnd);
      setProgress(20, '编码中…');

      let blob;
      if (currentFmt === 'wav') {
        blob = encodeWav(trimmed, p => setProgress(20 + p * 75, `编码中… ${Math.round(p * 100)}%`));
      } else {
        blob = await encodeMp3(trimmed, currentBr, p => setProgress(20 + p * 75, `编码中… ${Math.round(p * 100)}%`));
      }

      setProgress(100, '完成');

      const ext = currentFmt;
      resultFilename = audioFile.name.replace(/\.[^.]+$/, '') + '_trim.' + ext;
      resultBlob = blob;

      const url = URL.createObjectURL(blob);
      document.getElementById('audio-result').src = url;
      document.getElementById('result-name').textContent = resultFilename;
      document.getElementById('result-detail').textContent =
        `${fmtSize(blob.size)} · ${fmtTimePrecise(trimmed.duration)} · ${trimmed.sampleRate} Hz`;

      document.getElementById('result-area').style.display = 'flex';
      document.getElementById('btn-download').style.display = '';
      document.getElementById('btn-download').disabled = false;
      resetProgress(false);

    } catch (err) {
      resetProgress(false);
      alert('处理失败：' + err.message);
      console.error(err);
    }

    document.getElementById('btn-trim').disabled = false;
  }

  // ── AudioBuffer 切片 ──
  function sliceAudioBuffer(buf, start, end) {
    const sr = buf.sampleRate;
    const s = Math.max(0, Math.floor(start * sr));
    const e = Math.min(buf.length, Math.floor(end * sr));
    const length = Math.max(1, e - s);
    const offCtx = new OfflineAudioContext(buf.numberOfChannels, length, sr);
    const slice = offCtx.createBuffer(buf.numberOfChannels, length, sr);
    for (let c = 0; c < buf.numberOfChannels; c++) {
      slice.copyToChannel(buf.getChannelData(c).subarray(s, e), c);
    }
    return slice;
  }

  // ── WAV 编码 ──
  function encodeWav(audioBuffer, onProgress) {
    const numCh = audioBuffer.numberOfChannels;
    const sr = audioBuffer.sampleRate;
    const left = audioBuffer.getChannelData(0);
    const right = numCh >= 2 ? audioBuffer.getChannelData(1) : left;
    const outCh = Math.min(numCh, 2);
    const samples = left.length;
    const bytePerSample = 2;
    const dataLen = samples * outCh * bytePerSample;
    const buffer = new ArrayBuffer(44 + dataLen);
    const view = new DataView(buffer);
    const write = (offset, str) => { for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i)); };
    write(0, 'RIFF'); view.setUint32(4, 36 + dataLen, true);
    write(8, 'WAVE'); write(12, 'fmt ');
    view.setUint32(16, 16, true); view.setUint16(20, 1, true);
    view.setUint16(22, outCh, true); view.setUint32(24, sr, true);
    view.setUint32(28, sr * outCh * bytePerSample, true);
    view.setUint16(32, outCh * bytePerSample, true); view.setUint16(34, 16, true);
    write(36, 'data'); view.setUint32(40, dataLen, true);
    let offset = 44;
    for (let i = 0; i < samples; i++) {
      view.setInt16(offset, clamp16(left[i]), true); offset += 2;
      if (outCh === 2) { view.setInt16(offset, clamp16(right[i]), true); offset += 2; }
    }
    onProgress && onProgress(1);
    return new Blob([buffer], { type: 'audio/wav' });
  }

  // ── MP3 编码 (lamejs) ──
  async function encodeMp3(audioBuffer, bitrate, onProgress) {
    const numCh = Math.min(audioBuffer.numberOfChannels, 2);
    const sr = audioBuffer.sampleRate;
    const left = float32ToInt16(audioBuffer.getChannelData(0));
    const right = numCh >= 2 ? float32ToInt16(audioBuffer.getChannelData(1)) : left;

    const encoder = new lamejs.Mp3Encoder(numCh, sr, bitrate);
    const mp3Parts = [];
    const chunkSize = 1152;
    const total = left.length;

    for (let i = 0; i < total; i += chunkSize) {
      const l = left.subarray(i, i + chunkSize);
      const r = right.subarray(i, i + chunkSize);
      const buf = numCh === 1 ? encoder.encodeBuffer(l) : encoder.encodeBuffer(l, r);
      if (buf.length > 0) mp3Parts.push(buf);

      if (i % (chunkSize * 50) === 0) {
        onProgress(i / total);
        await new Promise(r => setTimeout(r, 0));
      }
    }

    const tail = encoder.flush();
    if (tail.length > 0) mp3Parts.push(tail);
    onProgress(1);
    return new Blob(mp3Parts, { type: 'audio/mpeg' });
  }

  // ── 工具函数 ──
  function float32ToInt16(f32) {
    const i16 = new Int16Array(f32.length);
    for (let i = 0; i < f32.length; i++) i16[i] = clamp16(f32[i]);
    return i16;
  }

  function clamp16(v) {
    const s = Math.max(-1, Math.min(1, v));
    return s < 0 ? s * 0x8000 : s * 0x7FFF;
  }

  function parseTimePrecise(str) {
    const parts = str.split(':');
    if (parts.length === 3) return parseFloat(parts[0]) * 3600 + parseFloat(parts[1]) * 60 + parseFloat(parts[2]);
    if (parts.length === 2) return parseFloat(parts[0]) * 60 + parseFloat(parts[1]);
    return parseFloat(str) || 0;
  }

  function fmtTimePrecise(s) {
    if (!isFinite(s)) return '--:--.0';
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return `${String(m).padStart(2, '0')}:${sec < 10 ? '0' : ''}${sec.toFixed(1)}`;
  }

  function fmtTime(s) {
    if (!isFinite(s)) return '--:--';
    const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = Math.floor(s % 60);
    if (h > 0) return `${h}:${String(m).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
    return `${String(m).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
  }

  function fmtSize(b) {
    if (b < 1024) return b + ' B';
    if (b < 1024 * 1024) return (b / 1024).toFixed(1) + ' KB';
    return (b / 1024 / 1024).toFixed(1) + ' MB';
  }

  function setProgress(pct, label) {
    document.getElementById('progress-bar').style.width = pct + '%';
    document.getElementById('progress-label').textContent = label;
  }

  function resetProgress(show) {
    document.getElementById('progress-area').style.display = show ? 'flex' : 'none';
    document.getElementById('progress-bar').style.width = '0%';
  }

  function resetResult() {
    resultBlob = null;
    document.getElementById('result-area').style.display = 'none';
    document.getElementById('btn-download').style.display = 'none';
    document.getElementById('btn-download').disabled = true;
    resetProgress(false);
  }

  function downloadResult() {
    if (!resultBlob) return;
    const a = document.createElement('a');
    a.href = URL.createObjectURL(resultBlob);
    a.download = resultFilename;
    a.click();
  }

  // 窗口 resize 时重绘波形
  window.addEventListener('resize', () => {
    if (audioBuffer) {
      drawWaveform();
      updateSelectionUI();
    }
  });
</script>
</body>
